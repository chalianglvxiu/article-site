<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scalecale=1.0,maximum-scale=1,user-scalable=no">
    <title>山茶的文集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "宋体", "SimSun", serif;
        }
        body {
            background: #F8F5F0;
            color: #333;
            line-height: 2;
            font-size: 16px;
        }

        /* 顶部标题 */
        .head {
            padding: 14px;
            text-align: center;
            font-size: 20px;
            background: #EFEBE3;
            border-bottom: 1px solid #DCD4C8;
        }

        /* 搜索 */
        .search-box {
            padding: 10px;
            background: #fff;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #D5CEC1;
            border-radius: 6px;
            background: #FDFBF7;
        }

        /* 分类 + 排序 */
        .tools {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            background: #fff;
            border-bottom: 1px solid #E5DFD5;
            flex-wrap: wrap;
            gap: 6px;
        }
        .btn {
            padding: 6px 10px;
            border: 1px solid #D5CEC1;
            background: #FDFBF7;
            border-radius: 6px;
            font-size: 14px;
        }

        /* 文章列表 */
        .list {
            padding: 10px 14px;
        }
        .item {
            padding: 12px 0;
            border-bottom: 1px solid #EAE3D7;
            font-size: 16px;
        }

        /* 文章阅读页 —— 完全按你图片样式 */
        .read-page {
            display: none;
            padding: 20px 16px;
            line-height: 2.1;
            font-size: 17px;
            background: #F8F5F0;
        }
        .read-title {
            text-align: center;
            font-size: 20px;
            margin-bottom: 24px;
            font-weight: normal;
        }
        .read-content {
            text-align: justify;
            text-indent: 2em;
        }

        /* 评论区 */
        .comment-box {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .comment-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .comment-item {
            background: #fff;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        /* 作者后台 */
        .author-page {
            display: none;
            padding: 16px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        textarea {
            height: 240px;
        }
        .manage-item {
            background: #fff;
            padding: 10px;
            border-radius: 6px;
            margin: 8px 0;
        }

        /* 底部 */
        .foot {
            text-align: center;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="head">山茶的文集</div>

<div class="search-box">
    <input type="text" placeholder="搜索文章" oninput="search()">
</div>

<div class="tools">
    <div>
        <button class="btn" onclick="setCate('all')">全部</button>
        <button class="btn" onclick="setCate('cate1')">短篇</button>
        <button class="btn" onclick="setCate('cate2')">中篇</button>
        <button class="btn" onclick="setCate('cate3')">长篇</button>
    </div>
    <div>
        <button class="btn" onclick="setSort('new')">最新</button>
        <button class="btn" onclick="setSort('old')">最早</button>
    </div>
</div>

<div class="list" id="list"></div>

<!-- 文章阅读页（和你图片一模一样） -->
<div class="read-page" id="readPage">
    <div class="read-title" id="readTitle"></div>
    <div class="read-content" id="readContent"></div>

    <div class="comment-box">
        <textarea class="comment-input" id="commentInput" placeholder="发表评论"></textarea>
        <button class="btn" onclick="sendComment()">发表</button>
        <div id="commentList"></div>
    </div>

    <br>
    <button class="btn" onclick="back()">返回列表</button>
</div>

<!-- 作者后台 -->
<div class="author-page" id="authorPage">
    <h3>作者后台</h3>
    <input placeholder="标题" id="title"><br>
    <select id="cate">
        <option value="cate1">短篇</option>
        <option value="cate2">中篇</option>
        <option value="cate3">长篇</option>
    </select><br>
    <textarea id="content" placeholder="内容"></textarea><br>
    <button class="btn" onclick="indent()">一键排版</button>
    <button class="btn" onclick="save()">保存文章</button>
    <button class="btn" onclick="clearEdit()">清空</button>

    <h3 style="margin-top:20px">文章管理</h3>
    <div id="manageList"></div>

    <br>
    <button class="btn" onclick="exitAuthor()">退出</button>
</div>

<div class="foot">
    <button class="btn" onclick="goAuthor()">作者模式</button>
</div>

<script>
let articles = [];
let cate = "all";
let sort = "new";
let nowId = null;
let editId = null;
const pwd = "shanchatea";

window.onload = renderList;

// 渲染列表
function renderList() {
    let arr = [...articles];
    if (sort === "new") arr.reverse();
    if (cate !== "all") arr = arr.filter(x => x.cate === cate);

    const dom = document.getElementById("list");
    dom.innerHTML = "";
    arr.forEach(x => {
        let div = document.createElement("div");
        div.className = "item";
        div.innerText = x.title;
        div.onclick = () => open(x.id);
        dom.appendChild(div);
    });
}

function setCate(c) { cate = c; renderList(); }
function setSort(s) { sort = s; renderList(); }

// 搜索
function search() {
    let k = document.querySelector(".search-box input").value;
    let arr = articles.filter(x => x.title.includes(k));
    if (sort === "new") arr.reverse();

    const dom = document.getElementById("list");
    dom.innerHTML = "";
    arr.forEach(x => {
        let div = document.createElement("div");
        div.className = "item";
        div.innerText = x.title;
        div.onclick = () => open(x.id);
        dom.appendChild(div);
    });
}

// 打开文章
function open(id) {
    nowId = id;
    let a = articles.find(x => x.id === id);
    document.querySelector(".list").style.display = "none";
    document.getElementById("readPage").style.display = "block";
    document.getElementById("readTitle").innerText = a.title;
    document.getElementById("readContent").innerText = a.content;
    renderComments();
}

function back() {
    document.getElementById("readPage").style.display = "none";
    document.querySelector(".list").style.display = "block";
}

// 评论
function sendComment() {
    let t = document.getElementById("commentInput").value;
    if (!t || !nowId) return;
    let a = articles.find(x => x.id === nowId);
    if (!a.comments) a.comments = [];
    a.comments.push({ text: t, isAuthor: false });
    renderComments();
    document.getElementById("commentInput").value = "";
}

function renderComments() {
    let a = articles.find(x => x.id === nowId);
    let dom = document.getElementById("commentList");
    dom.innerHTML = (a.comments || []).map((c, i) => `
    <div class="comment-item">
        ${c.isAuthor ? "作者：" : "读者："}${c.text}
        <div style="font-size:12px;margin-top:4px">
            <span onclick="reply(${i})" style="margin-right:10px">回复</span>
            <span onclick="del(${i})">删除</span>
        </div>
    </div>`).join("");
}

function reply(i) {
    let txt = prompt("回复：");
    if (!txt) return;
    let a = articles.find(x => x.id === nowId);
    a.comments.push({ text: txt, isAuthor: false });
    renderComments();
}

function del(i) {
    let a = articles.find(x => x.id === nowId);
    a.comments.splice(i, 1);
    renderComments();
}

// 作者
function goAuthor() {
    if (prompt("密码") === pwd) {
        document.body.innerHTML = "";
        document.body.appendChild(document.getElementById("authorPage"));
        document.getElementById("authorPage").style.display = "block";
        renderManage();
    }
}

function exitAuthor() { location.reload(); }

// 文章操作
function save() {
    let t = document.getElementById("title").value;
    let c = document.getElementById("content").value;
    let ca = document.getElementById("cate").value;
    if (!t || !c) return alert("请填写完整");

    if (editId) {
        let a = articles.find(x => x.id === editId);
        a.title = t; a.content = c; a.cate = ca;
    } else {
        articles.push({ id: Date.now(), title: t, content: c, cate: ca, comments: [] });
    }
    clearEdit();
    renderList();
    renderManage();
}

function clearEdit() {
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
    editId = null;
}

function indent() {
    let t = document.getElementById("content");
    t.value = t.value.split("\n").map(l => "　　" + l.trim()).join("\n");
}

// 管理
function renderManage() {
    let dom = document.getElementById("manageList");
    dom.innerHTML = articles.map(x => `
    <div class="manage-item">
        ${x.title} (${x.cate})
        <div style="margin-top:6px">
            <button class="btn" onclick="edit(${x.id})">编辑</button>
            <button class="btn" onclick="delArt(${x.id})">删除</button>
            <button class="btn" onclick="move(${x.id})">移动</button>
        </div>
    </div>`).join("");
}

function edit(id) {
    let a = articles.find(x => x.id === id);
    document.getElementById("title").value = a.title;
    document.getElementById("content").value = a.content;
    document.getElementById("cate").value = a.cate;
    editId = id;
}

function delArt(id) {
    articles = articles.filter(x => x.id !== id);
    renderManage();
    renderList();
}

function move(id) {
    let a = articles.find(x => x.id === id);
    let to = prompt("cate1 / cate2 / cate3");
    if (["cate1", "cate2", "cate3"].includes(to)) a.cate = to;
    renderManage();
    renderList();
}
</script>

</body>
</html>
