<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的文章书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: SimSun, "宋体", serif;
        }
        :root{
            --base-color:#f0efe4;
            --card-color:#fffdf9;
            --border-color:#e0d9cb;
            --theme-color:#efe9dd;
            --text-color:#333;
            --author-color:#b35050;
        }
        body {
            background: var(--base-color);
            color: var(--text-color);
            font-size: clamp(14px,1vw,16px);
        }
        html,body{height:100%;overflow:hidden;}
        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 大屏侧边栏固定，小屏顶部横排 */
        @media (min-width:768px){
            .container{flex-direction:row;}
            .sidebar{width:180px;height:100%;border-right:1px solid var(--border-color);flex-direction:column;flex-wrap:nowrap;}
            .article-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
        }
        @media (max-width:767px){
            .container{flex-direction:column;}
            .sidebar{width:100%;height:auto;max-height:150px;border-bottom:1px solid var(--border-color);flex-wrap:wrap;}
            .article-grid{grid-template-columns:repeat(2,1fr);}
        }

        .sidebar {
            background: var(--card-color);
            padding: clamp(8px,1.5vw,12px);
            overflow-y: auto;
            display: flex;
            gap: 6px;
            align-items: flex-start;
        }
        .sidebar h3 {
            font-size: clamp(13px,1vw,15px);
            width: 100%;
            margin: 4px 0;
            color: #554b3d;
            font-weight: normal;
        }
        .category-item, .status-item {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            border-radius: 4px;
            cursor: pointer;
            font-size: clamp(12px,0.9vw,14px);
            border: 1px solid transparent;
            white-space: nowrap;
            background: var(--card-color);
        }
        .category-item.active, .status-item.active {
            border-color: var(--border-color);
            background: var(--theme-color);
        }
        .add-category-btn {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            background: transparent;
            color: #665845;
            cursor: pointer;
            font-size: clamp(12px,0.9vw,14px);
        }

        .search-wrap{
            padding: clamp(6px,1vw,10px);
            background: var(--theme-color);
            display:flex;
            gap:6px;
        }
        #searchInput{
            flex:1;
            padding: clamp(6px,1vw,9px);
            border:1px solid var(--border-color);
            border-radius: 4px;
            outline:none;
            font-size: clamp(13px,1vw,15px);
        }
        .search-btn{
            padding: clamp(6px,1vw,9px) clamp(8px,1.5vw,12px);
            border:1px solid var(--border-color);
            border-radius: 4px;
            background: var(--card-color);
            cursor:pointer;
            font-size: clamp(12px,0.9vw,14px);
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background: var(--theme-color);
            padding: clamp(8px,1.2vw,12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap:8px;
        }
        .top-bar h1 {
            font-size: clamp(15px,1.2vw,18px);
            font-weight: normal;
            color:#443c30;
        }
        .top-bar button {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--card-color);
            cursor: pointer;
            font-size: clamp(12px,0.9vw,14px);
            color:#443c30;
        }
        .author-ctrl {display: none;}
        .article-grid {
            flex: 1;
            padding: clamp(8px,1.2vw,12px);
            overflow-y: auto;
            gap: clamp(8px,1.2vw,12px);
        }
        .article-card {
            background: var(--card-color);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .article-cover {
            height: clamp(100px,12vw,140px);
            background: #f8f5ee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(13px,1vw,15px);
            text-align: center;
            padding: 8px;
        }
        .article-info {
            padding: clamp(6px,1vw,10px);
            font-size: clamp(11px,0.8vw,13px);
        }
        .article-title {margin-bottom: 4px;font-weight:normal;}
        .article-actions {margin-top: 4px;display: flex;gap:4px;}
        .del-btn,.move-btn {
            background: none;border: none;cursor: pointer;
            font-size: clamp(10px,0.7vw,12px);
            color:#995544;
        }

        .reader-view {
            flex: 1;
            display: none;
            flex-direction: column;
            background: var(--card-color);
            overflow: hidden;
        }
        .reader-header {
            background: var(--theme-color);
            padding: clamp(8px,1.2vw,12px);
            display: flex;
            align-items: center;
            gap: clamp(6px,1vw,10px);
            flex-wrap:wrap;
            flex-shrink: 0;
        }
        .back-btn {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--card-color);
            cursor: pointer;
            font-size: clamp(12px,0.9vw,14px);
        }
        .status-set-box{display:flex;gap:4px;flex-wrap:wrap;}
        .status-set-btn{
            padding: clamp(4px,0.8vw,6px) clamp(6px,1vw,9px);
            border:1px solid var(--border-color);
            border-radius:3px;
            background: var(--card-color);
            font-size: clamp(11px,0.8vw,13px);
            cursor:pointer;
        }
        .reader-content {
            flex: 1;
            padding: clamp(12px,2vw,20px);
            overflow-y: auto;
            line-height:1.8;
        }
        .article-title-input {
            width: 100%;
            font-size: clamp(16px,1.5vw,20px);
            border: none;outline: none;
            margin-bottom: 12px;
            background: transparent;
        }
        .article-paragraph {margin-bottom: 8px;}
        .article-paragraph.indent {text-indent: 2em;}
        .highlight-text {
            background-color: #fff3cd;
            padding: 0 2px;
            border-radius: 2px;
        }
        .inline-comment-box {
            margin: 8px 0 12px;
            padding: clamp(8px,1.2vw,12px);
            background: #f8f5ee;
            border-radius: 4px;
            border-left: 3px solid #d4b886;
            position: relative;
        }
        .close-comment-btn {
            position: absolute;top: 4px;right: 6px;
            background: transparent;border: none;
            font-size: 16px;cursor: pointer;color:#666;
        }
        textarea {
            width: 100%;padding: 6px;border:1px solid #ddd3c2;
            border-radius:4px;margin-bottom:6px;resize:none;
            font-size: clamp(13px,1vw,15px);
        }
        .inline-comment-list .comment-item {
            padding: 6px;background:var(--card-color);
            border-radius:4px;margin-bottom:4px;
            font-size: clamp(12px,0.9vw,14px);
        }
        .comment-name {font-size: clamp(11px,0.8vw,13px);color:#72624c;margin-bottom:2px;}
        .author-tag {color:var(--author-color);font-weight:bold;margin-left:4px;}
        .reply-btn,.del-cmt-btn {
            font-size: clamp(11px,0.8vw,13px);
            color:#666;cursor:pointer;margin-left:6px;
        }
        .reply-box {margin-top:4px;display:none;}

        .comment-area {
            padding: clamp(8px,1.2vw,12px);
            border-top:1px solid var(--border-color);
            background:#fbf8f2;flex-shrink:0;
        }
        .comment-title {font-size: clamp(14px,1.1vw,16px);margin-bottom:8px;}
        .input-box {display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
        #nickname {
            width: clamp(70px,8vw,90px);padding:6px;
            border:1px solid #ddd3c2;border-radius:4px;
            font-size: clamp(13px,1vw,15px);outline:none;
        }
        #comment-input {flex:1;min-height:36px;}
        .submit-btn {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            background: var(--theme-color);border:1px solid var(--border-color);
            border-radius:4px;cursor:pointer;font-size: clamp(12px,0.9vw,14px);
        }
        .comment-item {
            padding: clamp(6px,1vw,10px);background:var(--card-color);
            border-radius:6px;margin-bottom:8px;border:1px solid var(--border-color);
            font-size: clamp(12px,0.9vw,14px);
        }

        .modal-mask {
            position: fixed;inset:0;
            background:rgba(0,0,0,0.2);display:none;
            align-items:center;justify-content:center;
            z-index:1000;padding:10px;
        }
        .modal-box {
            background:var(--card-color);padding: clamp(12px,2vw,18px);
            border-radius:6px;border:1px solid var(--border-color);
            width:100%;max-width:500px;
        }
        .modal-box input,.modal-box select {
            width:100%;padding:6px;margin:6px 0;
            border:1px solid var(--border-color);border-radius:4px;
            font-size: clamp(13px,1vw,15px);
        }
        .modal-btn {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            border:1px solid var(--border-color);border-radius:4px;
            background:var(--theme-color);cursor:pointer;
            font-size: clamp(12px,0.9vw,14px);margin-right:6px;
        }
        .indent-check {margin:6px 0;font-size: clamp(13px,1vw,15px);}

        /* 按钮点击适配 */
        button,div[onclick]{
            -webkit-tap-highlight-color:transparent;
            touch-action:manipulation;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h3>分类</h3>
        <div id="categoryList"></div>
        <button class="add-category-btn author-ctrl" onclick="openCategoryModal()">新增分类</button>

        <h3>阅读状态</h3>
        <div class="status-item active" data-status="all" onclick="filterByStatus('all')">全部</div>
        <div class="status-item" data-status="unread" onclick="filterByStatus('unread')">未读</div>
        <div class="status-item" data-status="reading" onclick="filterByStatus('reading')">在读</div>
        <div class="status-item" data-status="finished" onclick="filterByStatus('finished')">已读完</div>
    </div>

    <div class="main-area">
        <div class="bookshelf-view" style="height:100%;display:flex;flex-direction:column;">
            <div class="top-bar">
                <h1>文章书架</h1>
                <div>
                    <button id="modeToggleBtn" onclick="toggleMode()">作者模式</button>
                    <div class="author-ctrl">
                        <button onclick="openNewArticleModal()">新增文章</button>
                    </div>
                </div>
            </div>
            <div class="search-wrap">
                <input id="searchInput" placeholder="搜索标题">
                <button class="search-btn" onclick="searchArticle()">搜索</button>
            </div>
            <div class="article-grid" id="articleGrid"></div>
        </div>

        <div class="reader-view" id="readerView">
            <div class="reader-header">
                <button class="back-btn" onclick="goBack()">返回</button>
                <input type="text" class="article-title-input" id="readerTitle" placeholder="文章标题" readonly>
                <div class="status-set-box">
                    <button class="status-set-btn" onclick="setArticleStatus('unread')">未读</button>
                    <button class="status-set-btn" onclick="setArticleStatus('reading')">在读</button>
                    <button class="status-set-btn" onclick="setArticleStatus('finished')">已读</button>
                </div>
                <div class="author-ctrl">
                    <button onclick="toggleEdit()">编辑</button>
                </div>
            </div>
            <div class="reader-content">
                <div id="articleBodyContainer" class="article-body-container"></div>
            </div>
            <div class="comment-area">
                <h3 class="comment-title">整体评价</h3>
                <div class="input-box">
                    <input id="nickname" placeholder="昵称">
                    <textarea id="comment-input" placeholder="写下感想"></textarea>
                    <button class="submit-btn" onclick="addComment()">发布</button>
                </div>
                <div id="commentList"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-mask" id="categoryModal">
    <div class="modal-box">
        <div>新增分类</div>
        <input type="text" id="newCategoryName" placeholder="输入分类名称">
        <div style="margin-top:8px;">
            <button class="modal-btn" onclick="addCategory()">确定</button>
            <button class="modal-btn" onclick="closeCategoryModal()">取消</button>
        </div>
    </div>
</div>
<div class="modal-mask" id="articleModal">
    <div class="modal-box">
        <div>新增文章</div>
        <input type="text" id="newArticleTitle" placeholder="文章标题">
        <div style="margin-top:8px;">
            <button class="modal-btn" onclick="addArticle()">确定</button>
            <button class="modal-btn" onclick="closeArticleModal()">取消</button>
        </div>
    </div>
</div>
<div class="modal-mask" id="moveModal">
    <div class="modal-box">
        <div>移动分类</div>
        <select id="moveCategorySelect"></select>
        <div style="margin-top:8px;">
            <button class="modal-btn" onclick="confirmMoveArticle()">确定</button>
            <button class="modal-btn" onclick="closeMoveModal()">取消</button>
        </div>
    </div>
</div>
<div class="modal-mask" id="pwdModal">
    <div class="modal-box">
        <div>输入作者密码</div>
        <input type="password" id="pwdInput" placeholder="密码">
        <div style="margin-top:8px;">
            <button class="modal-btn" onclick="checkPwd()">解锁</button>
            <button class="modal-btn" onclick="closePwdModal()">取消</button>
        </div>
    </div>
</div>
<div class="modal-mask" id="editModal">
    <div class="modal-box">
        <div>编辑内容</div>
        <textarea id="editContent" style="width:100%;height:220px;margin:8px 0;"></textarea>
        <div class="indent-check">
            <label><input type="checkbox" id="indentSwitch"> 全文首行缩进两格</label>
        </div>
        <div style="margin-top:8px;">
            <button class="modal-btn" onclick="saveEditContent()">保存</button>
            <button class="modal-btn" onclick="closeEditModal()">取消</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = "cp_article_shelf";
    const AUTHOR_PWD = "123456";
    let isAuthor = false,hasAuthorAuth = false;
    let currentCategoryId = null,currentArticleId = null;
    let currentFilterStatus = "all",inlineComments = {};
    let platformData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {categories:[],articles:[],comments:[]};

    function searchArticle(){renderArticles();}
    function toggleMode(){
        if(!hasAuthorAuth)return document.getElementById("pwdModal").style.display="flex";
        isAuthor=!isAuthor;
        document.querySelectorAll(".author-ctrl").forEach(e=>e.style.display=isAuthor?"block":"none");
        document.querySelectorAll(".article-actions").forEach(e=>e.style.display=isAuthor?"flex":"none");
        document.getElementById("modeToggleBtn").innerText=isAuthor?"读者模式":"作者模式";
        if(currentArticleId)openReader(currentArticleId);
    }
    function checkPwd(){
        if(document.getElementById("pwdInput").value.trim()===AUTHOR_PWD){
            hasAuthorAuth=true;toggleMode();closePwdModal();alert("解锁成功");
        }else alert("密码错误");
    }
    function closePwdModal(){document.getElementById("pwdModal").style.display="none";}
    function openCategoryModal(){document.getElementById("categoryModal").style.display="flex";}
    function closeCategoryModal(){document.getElementById("categoryModal").style.display="none";}
    function addCategory(){
        let n=document.getElementById("newCategoryName").value.trim();
        if(!n)return;
        platformData.categories.push({id:Date.now().toString(),name:n});
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        renderCategories();closeCategoryModal();
    }
    function renderCategories(){
        let l=document.getElementById("categoryList");l.innerHTML="";
        platformData.categories.forEach(c=>{
            let d=document.createElement("div");
            d.className="category-item"+(c.id===currentCategoryId?" active":"");
            d.innerText=c.name;d.onclick=()=>selectCategory(c.id);
            l.appendChild(d);
        });
    }
    function selectCategory(id){currentCategoryId=id;renderArticles();renderCategories();}
    function filterByStatus(s){
        currentFilterStatus=s;
        document.querySelectorAll(".status-item").forEach(d=>d.classList.toggle("active",d.dataset.status===s));
        renderArticles();
    }
    function setArticleStatus(s){
        if(!currentArticleId)return;
        let i=platformData.articles.findIndex(a=>a.id===currentArticleId);
        if(i>-1){platformData.articles[i].status=s;localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));}
        alert("状态修改成功");renderArticles();
    }
    function openMoveModal(id){
        currentArticleId=id;
        let s=document.getElementById("moveCategorySelect");s.innerHTML="";
        platformData.categories.forEach(c=>s.options.add(new Option(c.name,c.id)));
        document.getElementById("moveModal").style.display="flex";
    }
    function closeMoveModal(){document.getElementById("moveModal").style.display="none";}
    function confirmMoveArticle(){
        let t=document.getElementById("moveCategorySelect").value;
        let i=platformData.articles.findIndex(a=>a.id===currentArticleId);
        if(i>-1){platformData.articles[i].categoryId=t;localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));renderArticles();closeMoveModal();}
    }
    function openNewArticleModal(){if(!currentCategoryId)return;document.getElementById("articleModal").style.display="flex";}
    function closeArticleModal(){document.getElementById("articleModal").style.display="none";}
    function addArticle(){
        let t=document.getElementById("newArticleTitle").value.trim();
        if(!t)return;
        platformData.articles.push({id:Date.now().toString(),categoryId:currentCategoryId,title:t,content:"",status:"unread"});
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        renderArticles();closeArticleModal();
    }
    function renderArticles(){
        let g=document.getElementById("articleGrid");g.innerHTML="";
        let k=document.getElementById("searchInput").value.trim().toLowerCase();
        let list=platformData.articles.filter(a=>a.categoryId===currentCategoryId);
        if(k)list=list.filter(a=>a.title.toLowerCase().includes(k));
        if(currentFilterStatus!=="all")list=list.filter(a=>a.status===currentFilterStatus);
        list.forEach(art=>{
            let c=document.createElement("div");c.className="article-card";
            c.innerHTML=`
                <div class="article-cover">${art.title}</div>
                <div class="article-info">
                    <div class="article-title">${art.title}</div>
                    <div class="article-actions" style="display:${isAuthor?'flex':'none'}">
                        <button class="move-btn" onclick="openMoveModal('${art.id}')">移动</button>
                        <button class="del-btn" onclick="deleteArticle('${art.id}')">删除</button>
                    </div>
                </div>
            `;
            c.onclick=e=>{if(!e.target.classList.contains("del-btn")&&!e.target.classList.contains("move-btn"))openReader(art.id);};
            g.appendChild(c);
        });
    }
    function deleteArticle(id){
        if(!confirm("确定删除？"))return;
        platformData.articles=platformData.articles.filter(a=>a.id!==id);
        platformData.comments=platformData.comments.filter(c=>c.articleId!==id);
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        renderArticles();
    }
    function openReader(id){
        currentArticleId=id;
        let art=platformData.articles.find(a=>a.id===id);
        if(!art)return;
        document.getElementById("readerTitle").value=art.title;
        document.querySelector(".bookshelf-view").style.display="none";
        document.getElementById("readerView").style.display="flex";
        renderArticleBody(art);renderComments();
    }
    function renderArticleBody(art){
        let cont=document.getElementById("articleBodyContainer");
        let ps=art.content.split("\n");cont.innerHTML="";
        inlineComments=JSON.parse(localStorage.getItem(`${STORAGE_KEY}_inline_${currentArticleId}`))||{};
        ps.forEach((p,idx)=>{
            let pEl=document.createElement("div");
            pEl.className="article-paragraph";pEl.id=`para-${idx}`;pEl.textContent=p;
            let cBox=document.createElement("div");
            cBox.className="inline-comment-box";cBox.id=`comment-box-${idx}`;cBox.style.display="none";
            cBox.innerHTML=`
                <button class="close-comment-btn" onclick="closeInlineComment(${idx})">×</button>
                <textarea placeholder="段落评价"></textarea>
                <button class="submit-btn" onclick="addInlineComment(${idx})">提交</button>
                <div class="inline-comment-list" id="inline-comment-list-${idx}"></div>
            `;
            cont.appendChild(pEl);cont.appendChild(cBox);
            if(inlineComments[idx])showCommentList(idx);
        });
        cont.onmouseup=()=>{
            let s=window.getSelection(),txt=s.toString().trim();
            if(!txt)return;
            let r=s.getRangeAt(0);
            let para=r.startContainer.parentElement.closest(".article-paragraph");
            if(!para)return;
            let idx=para.id.split("-")[1];
            document.getElementById(`comment-box-${idx}`).style.display="block";
            let span=document.createElement("span");
            span.className="highlight-text";span.textContent=txt;
            r.deleteContents();r.insertNode(span);s.removeAllRanges();
        };
    }
    function closeInlineComment(idx){document.getElementById(`comment-box-${idx}`).style.display="none";}
    function showCommentList(idx){
        let list=document.getElementById(`inline-comment-list-${idx}`);list.innerHTML="";
        if(!inlineComments[idx])return;
        inlineComments[idx].forEach((c,i)=>{
            list.innerHTML+=`
                <div class="comment-item">
                    <div class="comment-name">
                        ${c.nickname} ${c.time}
                        ${c.isAuthor?'<span class="author-tag">作者</span>':''}
                        ${isAuthor?`<span class="reply-btn" onclick="toggleReply(${idx},${i})">回复</span><span class="del-cmt-btn" onclick="delInlineComment(${idx},${i})">删除</span>`:''}
                    </div>
                    <div>${c.content}</div>
                    <div class="reply-box" id="reply-box-${idx}-${i}">
                        <textarea placeholder="作者回复"></textarea>
                        <button class="submit-btn" onclick="submitReply(${idx},${i})">提交</button>
                    </div>
                </div>
            `;
        });
    }
    function addInlineComment(idx){
        let box=document.getElementById(`comment-box-${idx}`);
        let txt=box.querySelector("textarea").value.trim();
        let nick=document.getElementById("nickname").value.trim()||"匿名";
        if(!txt)return;
        if(!inlineComments[idx])inlineComments[idx]=[];
        inlineComments[idx].push({nickname:nick,content:txt,time:new Date().toLocaleString(),isAuthor:false});
        localStorage.setItem(`${STORAGE_KEY}_inline_${currentArticleId}`,JSON.stringify(inlineComments));
        box.querySelector("textarea").value="";showCommentList(idx);
    }
    function toggleReply(idx,i){
        let d=document.getElementById(`reply-box-${idx}-${i}`);
        d.style.display=d.style.display==="block"?"none":"block";
    }
    function submitReply(idx,i){
        let d=document.getElementById(`reply-box-${idx}-${i}`);
        let txt=d.querySelector("textarea").value.trim();
        if(!txt||!isAuthor)return;
        inlineComments[idx].push({nickname:"作者",content:txt,time:new Date().toLocaleString(),isAuthor:true});
        localStorage.setItem(`${STORAGE_KEY}_inline_${currentArticleId}`,JSON.stringify(inlineComments));
        d.style.display="none";showCommentList(idx);
    }
    function delInlineComment(idx,i){
        if(!isAuthor||!confirm("删除本条？"))return;
        inlineComments[idx].splice(i,1);
        if(inlineComments[idx].length===0)delete inlineComments[idx];
        localStorage.setItem(`${STORAGE_KEY}_inline_${currentArticleId}`,JSON.stringify(inlineComments));
        showCommentList(idx);
    }
    function goBack(){
        document.getElementById("readerView").style.display="none";
        document.querySelector(".bookshelf-view").style.display="flex";
        currentArticleId=null;
    }
    function toggleEdit(){
        if(!isAuthor)return;
        let art=platformData.articles.find(a=>a.id===currentArticleId);
        document.getElementById("editContent").value=art.content;
        document.getElementById("indentSwitch").checked=false;
        document.getElementById("editModal").style.display="flex";
    }
    function closeEditModal(){document.getElementById("editModal").style.display="none";}
    function saveEditContent(){
        let cont=document.getElementById("editContent").value;
        if(document.getElementById("indentSwitch").checked)cont=cont.replace(/^/gm,"　　");
        let idx=platformData.articles.findIndex(a=>a.id===currentArticleId);
        if(idx>-1)platformData.articles[idx].content=cont;
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        closeEditModal();openReader(currentArticleId);
    }
    function addComment(){
        let nick=document.getElementById("nickname").value.trim()||"匿名";
        let txt=document.getElementById("comment-input").value.trim();
        if(!txt||!currentArticleId)return;
        platformData.comments.push({id:Date.now().toString(),articleId:currentArticleId,user:nick,content:txt,time:new Date().toLocaleString(),reply:[]});
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        document.getElementById("comment-input").value="";renderComments();
    }
    function toggleBottomReply(cid){
        let d=document.getElementById(`bottom-reply-${cid}`);
        d.style.display=d.style.display==="block"?"none":"block";
    }
    function submitBottomReply(cid){
        if(!isAuthor)return;
        let c=platformData.comments.find(x=>x.id===cid);
        let inp=document.querySelector(`#bottom-reply-${cid} textarea`);
        let val=inp.value.trim();
        if(!val)return;
        c.reply.push({name:"作者",content:val,time:new Date().toLocaleString()});
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        renderComments();
    }
    function delBottomComment(cid){
        if(!isAuthor||!confirm("删除评论？"))return;
        platformData.comments=platformData.comments.filter(x=>x.id!==cid);
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        renderComments();
    }
    function renderComments(){
        let list=document.getElementById("commentList");list.innerHTML="";
        let arr=platformData.comments.filter(c=>c.articleId===currentArticleId);
        arr.forEach(c=>{
            let repHtml="";
            if(c.reply&&c.reply.length){
                c.reply.forEach(r=>{
                    repHtml+=`<div style="margin-top:5px;padding:5px;background:#f5f0e6;border-radius:4px;font-size:clamp(11px,0.8vw,13px);">
                        <span class="author-tag">${r.name}</span> ${r.time}：${r.content}
                    </div>`;
                });
            }
            let optHtml=isAuthor?`
                <span class="reply-btn" onclick="toggleBottomReply('${c.id}')">回复</span>
                <span class="del-cmt-btn" onclick="delBottomComment('${c.id}')">删除</span>
                <div id="bottom-reply-${c.id}" style="display:none;margin-top:6px;">
                    <textarea placeholder="回复内容" style="width:100%;height:40px;"></textarea>
                    <button class="submit-btn" onclick="submitBottomReply('${c.id}')">提交</button>
                </div>
            `:"";
            list.innerHTML+=`
                <div class="comment-item">
                    <div class="comment-name">${c.user} ${c.time} ${optHtml}</div>
                    <div>${c.content}</div>${repHtml}
                </div>
            `;
        });
    }
    document.getElementById("searchInput").addEventListener("keydown",e=>e.key==="Enter"&&searchArticle());
    window.onload=()=>{
        if(!platformData.categories.length)platformData.categories.push({id:"default",name:"默认分类"});
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        currentCategoryId=platformData.categories[0].id;
        renderCategories();renderArticles();
    };
</script>
</body>
</html>
