<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>山茶的文集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "宋体", SimSun, serif;
        }
        body {
            background-color: #fff;
            color: #000;
            line-height: 2;
            font-size: 16px;
        }
        .header {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 20px;
        }
        .search-box {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .search-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }
        .btn {
            padding: 6px 10px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .article-list {
            padding: 10px 16px;
        }
        .article-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .read-page {
            display: none;
            padding: 24px 20px;
        }
        .read-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 28px;
        }
        .read-content {
            text-align: justify;
            text-indent: 2em;
            font-size: 16px;
        }
        .highlight {
            text-decoration: underline;
            background-color: #fdf6d3;
        }
        .comment-pop {
            position: absolute;
            padding: 8px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 4px;
            z-index: 999;
            display: none;
        }
        .toggle-mark {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 999;
        }
        .comment-section {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .comment-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
            resize: vertical;
        }
        .comment-item {
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .author-panel {
            display: none;
            padding: 20px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
        }
        textarea {
            height: 220px;
        }
        .manage-item {
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 4px;
            margin: 8px 0;
        }
        .footer-bar {
            text-align: center;
            padding: 12px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
<div id="commentPop" class="comment-pop">
    <textarea id="popCommentInput" placeholder="对选中内容评论..." style="width:200px;height:80px;"></textarea>
    <br>
    <button class="btn" onclick="submitHighlightComment()">提交</button>
    <button class="btn" onclick="closeCommentPop()">取消</button>
</div>

<div id="readerPage">
    <div class="header">山茶的文集</div>
    <div class="search-box">
        <input class="search-input" placeholder="搜索文章标题" oninput="searchArticle()">
    </div>
    <div class="toolbar">
        <div class="cate-group">
            <button class="btn" onclick="filterCate('all')">全部</button>
            <button class="btn" onclick="filterCate('cate1')">短篇</button>
            <button class="btn" onclick="filterCate('cate2')">中篇</button>
            <button class="btn" onclick="filterCate('cate3')">长篇</button>
        </div>
        <div class="sort-group">
            <button class="btn" onclick="sortNew()">最新</button>
            <button class="btn" onclick="sortOld()">最早</button>
        </div>
    </div>
    <div class="article-list" id="articleList"></div>
    <div class="read-page" id="readPage">
        <button class="btn toggle-mark" onclick="toggleHighlight()">关闭划线</button>
        <div class="read-title" id="artTitle"></div>
        <div class="read-content" id="artContent"></div>
        <div class="comment-section">
            <textarea class="comment-input" id="commentInput" placeholder="写下你的评论..."></textarea>
            <button class="btn" onclick="submitComment()">发表评论</button>
            <div id="commentList"></div>
        </div>
        <br>
        <button class="btn" onclick="backToList()">返回目录</button>
    </div>
    <div class="footer-bar">
        <button class="btn" onclick="verifyPwd()">进入作者模式</button>
    </div>
</div>

<div class="author-panel" id="authorPanel">
    <h3 style="margin-bottom:10px;">作者编辑后台</h3>
    <input placeholder="文章标题" id="titleInput">
    <select id="cateSelect">
        <option value="cate1">短篇</option>
        <option value="cate2">中篇</option>
        <option value="cate3">长篇</option>
    </select>
    <textarea id="contentInput" placeholder="撰写文章正文"></textarea>
    <button class="btn" onclick="autoIndent()">一键缩进排版</button>
    <button class="btn" onclick="saveArticle()">保存文章</button>
    <button class="btn" onclick="clearEdit()">清空编辑</button>
    <hr style="margin:20px 0;border:0;border-top:1px solid #eee;">
    <h3>文章管理</h3>
    <div id="manageList"></div>
    <br>
    <button class="btn" onclick="exitAuthorMode()">退出作者模式</button>
</div>

<script>
// 初始内置文章，所有人打开均可看见
let articles = [
    // 在此处自行增补文章示例格式
    /*
    {
        id:1,
        title:"示例标题",
        cate:"cate1",
        content:"　　正文内容正文内容正文内容。",
        comments:[]
    }
    */
];
let currentCate = "all";
let sortType = "new";
let currentArtId = null;
let editArtId = null;
let highlightOpen = true;
const authorPwd = "shanchatea";
let currentSelectionRange = null;
let currentSelectionText = "";

document.addEventListener("DOMContentLoaded",function(){
    renderArticleList();
    const contentDom = document.getElementById("artContent");
    contentDom.addEventListener("mouseup",onTextSelected);
    contentDom.addEventListener("touchend",onTextSelected);
});

function renderArticleList(){
    let showList = [...articles];
    if(sortType === "new") showList.reverse();
    if(currentCate !== "all") showList = showList.filter(item=>item.cate === currentCate);
    const listDom = document.getElementById("articleList");
    listDom.innerHTML = "";
    showList.forEach(art=>{
        let div = document.createElement("div");
        div.className = "article-item";
        div.innerText = art.title;
        div.onclick = ()=>openArticle(art.id);
        listDom.appendChild(div);
    });
}
function filterCate(cate){
    currentCate = cate;
    renderArticleList();
}
function sortNew(){sortType="new";renderArticleList();}
function sortOld(){sortType="old";renderArticleList();}
function searchArticle(){
    let key = document.querySelector(".search-input").value.trim();
    let searchList = articles.filter(item=>item.title.includes(key));
    if(sortType === "new") searchList.reverse();
    const listDom = document.getElementById("articleList");
    listDom.innerHTML = "";
    searchList.forEach(art=>{
        let div = document.createElement("div");
        div.className = "article-item";
        div.innerText = art.title;
        div.onclick = ()=>openArticle(art.id);
        listDom.appendChild(div);
    });
}
function toggleHighlight(){
    highlightOpen = !highlightOpen;
    let btn = document.querySelector(".toggle-mark");
    btn.innerText = highlightOpen ? "关闭划线" : "开启划线";
    if(currentArtId){
        let art = articles.find(a=>a.id===currentArtId);
        document.getElementById("artContent").innerHTML = art.content;
    }
}
function openArticle(id){
    currentArtId = id;
    let art = articles.find(item=>item.id===id);
    document.querySelector(".article-list").style.display = "none";
    document.getElementById("readPage").style.display = "block";
    document.getElementById("artTitle").innerText = art.title;
    document.getElementById("artContent").innerHTML = art.content;
    renderCommentList(art.comments);
}
function backToList(){
    document.getElementById("readPage").style.display = "none";
    document.querySelector(".article-list").style.display = "block";
    currentArtId = null;
}
function submitComment(){
    let inputDom = document.getElementById("commentInput");
    let content = inputDom.value.trim();
    if(!content || !currentArtId) return;
    let art = articles.find(item=>item.id===currentArtId);
    art.comments.push({cid:Date.now(),name:"读者",content:content,isAuthor:false});
    renderCommentList(art.comments);
    inputDom.value = "";
}
function renderCommentList(commentArr){
    let commentDom = document.getElementById("commentList");
    commentDom.innerHTML = "";
    commentArr.forEach(comm=>{
        let item = document.createElement("div");
        item.className = "comment-item";
        item.innerHTML = `
            <div style="font-weight:bold;margin-bottom:4px;">${comm.isAuthor ? "作者山茶" : comm.name}</div>
            <div>${comm.content}</div>
            <div style="margin-top:6px;font-size:13px;color:#666;">
                <span onclick="replyComment(${comm.cid})" style="margin-right:12px;cursor:pointer;">回复</span>
                <span onclick="delSelfComment(${comm.cid})" style="cursor:pointer;">删除</span>
            </div>
        `;
        commentDom.appendChild(item);
    });
}
function replyComment(cid){
    let replyTxt = prompt("输入回复内容：");
    if(!replyTxt) return;
    let art = articles.find(item=>item.id===currentArtId);
    art.comments.push({cid:Date.now(),name:"读者",content:replyTxt,isAuthor:false});
    renderCommentList(art.comments);
}
function delSelfComment(cid){
    let art = articles.find(item=>item.id===currentArtId);
    art.comments = art.comments.filter(c=>c.cid!==cid);
    renderCommentList(art.comments);
}
function onTextSelected(e){
    if(!highlightOpen) return;
    let sel = window.getSelection();
    let text = sel.toString().trim();
    if(!text) return;
    currentSelectionText = text;
    currentSelectionRange = sel.getRangeAt(0);
    let rect = currentSelectionRange.getBoundingClientRect();
    let pop = document.getElementById("commentPop");
    pop.style.left = (rect.left + window.scrollX) + "px";
    pop.style.top = (rect.bottom + window.scrollY + 5) + "px";
    pop.style.display = "block";
    document.getElementById("popCommentInput").value = "";
}
function closeCommentPop(){
    document.getElementById("commentPop").style.display = "none";
    currentSelectionRange = null;
    currentSelectionText = "";
}
function submitHighlightComment(){
    let txt = document.getElementById("popCommentInput").value.trim();
    if(!txt || !currentSelectionRange) return;
    let span = document.createElement("span");
    span.className = "highlight";
    currentSelectionRange.surroundContents(span);
    let art = articles.find(item=>item.id===currentArtId);
    art.comments.push({cid:Date.now(),name:"读者",content:"【划词评论】"+txt,isAuthor:false});
    renderCommentList(art.comments);
    closeCommentPop();
}
function verifyPwd(){
    let pwd = prompt("请输入作者密码");
    if(pwd === authorPwd){
        document.getElementById("readerPage").style.display = "none";
        document.getElementById("authorPanel").style.display = "block";
        renderManageArticle();
    }else alert("密码错误");
}
function exitAuthorMode(){
    document.getElementById("authorPanel").style.display = "none";
    document.getElementById("readerPage").style.display = "block";
    renderArticleList();
}
function saveArticle(){
    let title = document.getElementById("titleInput").value.trim();
    let cate = document.getElementById("cateSelect").value;
    let content = document.getElementById("contentInput").value.trim();
    if(!title || !content) return alert("标题和内容不能为空");
    if(editArtId){
        let art = articles.find(item=>item.id===editArtId);
        art.title = title;
        art.cate = cate;
        art.content = content;
    }else{
        articles.push({id:Date.now(),title:title,cate:cate,content:content,comments:[]});
    }
    clearEdit();
    renderArticleList();
    renderManageArticle();
    alert("保存成功，更新代码后上传生效");
}
function clearEdit(){
    document.getElementById("titleInput").value = "";
    document.getElementById("contentInput").value = "";
    document.getElementById("cateSelect").value = "cate1";
    editArtId = null;
}
function autoIndent(){
    let textDom = document.getElementById("contentInput");
    let lines = textDom.value.split("\n");
    let newLines = lines.map(line=>line.trim()?"　　"+line.trim():line);
    textDom.value = newLines.join("\n");
}
function renderManageArticle(){
    let manageDom = document.getElementById("manageList");
    manageDom.innerHTML = "";
    articles.forEach(art=>{
        let item = document.createElement("div");
        item.className = "manage-item";
        item.innerHTML = `
            <div>${art.title}【${art.cate}】</div>
            <div style="margin-top:6px">
                <button class="btn" onclick="editArticle(${art.id})">编辑</button>
                <button class="btn" onclick="deleteArticle(${art.id})">删除</button>
                <button class="btn" onclick="moveCateArticle(${art.id})">移动分类</button>
            </div>
        `;
        manageDom.appendChild(item);
    });
}
function editArticle(id){
    let art = articles.find(item=>item.id===id);
    document.getElementById("titleInput").value = art.title;
    document.getElementById("cateSelect").value = art.cate;
    document.getElementById("contentInput").value = art.content;
    editArtId = id;
}
function deleteArticle(id){
    articles = articles.filter(item=>item.id!==id);
    renderManageArticle();
    renderArticleList();
}
function moveCateArticle(id){
    let art = articles.find(item=>item.id===id);
    let targetCate = prompt("输入分类：cate1/cate2/cate3",art.cate);
    if(["cate1","cate2","cate3"].includes(targetCate)){
        art.cate = targetCate;
        renderManageArticle();
        renderArticleList();
    }
}
</script>
</body>
</html>
