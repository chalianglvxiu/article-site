<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的文章书架（导入导出版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: SimSun, "宋体", serif;
        }
        :root{
            --base-color:#f0efe4;
            --card-color:#fffdf9;
            --border-color:#e0d9cb;
            --theme-color:#efe9dd;
            --text-color:#333;
            --author-color:#b35050;
        }
        body {
            background: var(--base-color);
            color: var(--text-color);
            font-size: clamp(14px,1vw,16px);
        }
        html,body{height:100%;overflow:hidden;}
        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        @media (min-width:768px){
            .container{flex-direction:row;}
            .sidebar{width:180px;height:100%;border-right:1px solid var(--border-color);flex-direction:column;flex-wrap:nowrap;}
            .article-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
        }
        @media (max-width:767px){
            .container{flex-direction:column;}
            .sidebar{width:100%;height:auto;max-height:150px;border-bottom:1px solid var(--border-color);flex-wrap:wrap;}
            .article-grid{grid-template-columns:repeat(2,1fr);}
        }

        .sidebar {
            background: var(--card-color);
            padding: clamp(8px,1.5vw,12px);
            overflow-y: auto;
            display: flex;
            gap: 6px;
            align-items: flex-start;
        }
        .sidebar h3 {
            font-size: clamp(13px,1vw,15px);
            width: 100%;
            margin: 4px 0;
            color: #554b3d;
            font-weight: normal;
        }
        .category-item, .status-item {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            border-radius: 4px;
            cursor: pointer;
            font-size: clamp(12px,0.9vw,14px);
            border: 1px solid transparent;
            white-space: nowrap;
            background: var(--card-color);
            position: relative;
        }
        .category-item.active, .status-item.active {
            border-color: var(--border-color);
            background: var(--theme-color);
        }
        .cate-edit-btn{
            position:absolute;
            right:4px;
            top:2px;
            font-size:10px;
            color:#888;
            display:none;
        }
        .category-item:hover .cate-edit-btn{
            display:block;
        }
        .add-category-btn {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            background: transparent;
            color: #665845;
            cursor: pointer;
            font-size: clamp(12px,0.9vw,14px);
        }

        .search-wrap{
            padding: clamp(6px,1vw,10px);
            background: var(--theme-color);
            display:flex;
            gap:6px;
        }
        #searchInput{
            flex:1;
            padding: clamp(6px,1vw,9px);
            border:1px solid var(--border-color);
            border-radius: 4px;
            outline:none;
            font-size: clamp(13px,1vw,15px);
        }
        .search-btn{
            padding: clamp(6px,1vw,9px) clamp(8px,1.5vw,12px);
            border:1px solid var(--border-color);
            border-radius: 4px;
            background: var(--card-color);
            cursor:pointer;
            font-size: clamp(12px,0.9vw,14px);
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background: var(--theme-color);
            padding: clamp(8px,1.2vw,12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap:8px;
        }
        .top-bar h1 {
            font-size: clamp(15px,1.2vw,18px);
            font-weight: normal;
            color:#443c30;
        }
        .top-bar button {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--card-color);
            cursor: pointer;
            font-size: clamp(12px,0.9vw,14px);
            color:#443c30;
        }
        .author-ctrl {display: none;}
        .article-grid {
            flex: 1;
            padding: clamp(8px,1.2vw,12px);
            overflow-y: auto;
            display: grid;
            gap: clamp(8px,1.2vw,12px);
        }
        .article-card {
            background: var(--card-color);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .article-cover {
            height: clamp(100px,12vw,140px);
            background: #f8f5ee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(13px,1vw,15px);
            text-align: center;
            padding: 8px;
        }
        .article-info {
            padding: clamp(6px,1vw,10px);
            font-size: clamp(11px,0.8vw,13px);
        }
        .article-title {margin-bottom: 4px;font-weight:normal;}
        .article-actions {margin-top: 4px;display: flex;gap:4px;}
        .del-btn,.move-btn {
            background: none;border: none;cursor: pointer;
            font-size: clamp(10px,0.7vw,12px);
            color:#995544;
        }

        .reader-view {
            flex: 1;
            display: none;
            flex-direction: column;
            background: var(--card-color);
            overflow: hidden;
        }
        .reader-header {
            background: var(--theme-color);
            padding: clamp(8px,1.2vw,12px);
            display: flex;
            align-items: center;
            gap: clamp(6px,1vw,10px);
            flex-wrap:wrap;
            flex-shrink: 0;
        }
        .back-btn {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--card-color);
            cursor: pointer;
            font-size: clamp(12px,0.9vw,14px);
        }
        .status-set-box{display:flex;gap:4px;flex-wrap:wrap;}
        .status-set-btn{
            padding: clamp(4px,0.8vw,6px) clamp(6px,1vw,9px);
            border:1px solid var(--border-color);
            border-radius:3px;
            background: var(--card-color);
            font-size: clamp(11px,0.8vw,13px);
            cursor:pointer;
        }
        .reader-content {
            flex: 1;
            padding: clamp(12px,2vw,20px);
            overflow-y: auto;
            line-height:1.8;
        }
        .article-title-input {
            width: 100%;
            font-size: clamp(16px,1.5vw,20px);
            border: none;outline: none;
            margin-bottom: 12px;
            background: transparent;
        }
        .article-paragraph {margin-bottom: 8px;}
        .highlight-text {
            background-color: #fff3cd;
            padding: 0 2px;
            border-radius: 2px;
        }
        .inline-comment-box {
            margin: 8px 0 12px;
            padding: clamp(8px,1.2vw,12px);
            background: #f8f5ee;
            border-radius: 4px;
            border-left: 3px solid #d4b886;
            position: relative;
        }
        .close-comment-btn {
            position: absolute;top: 4px;right: 6px;
            background: transparent;border: none;
            font-size: 16px;cursor: pointer;color:#666;
        }
        textarea {
            width: 100%;padding: 6px;border:1px solid #ddd3c2;
            border-radius:4px;margin-bottom:6px;resize:none;
            font-size: clamp(13px,1vw,15px);
        }
        .inline-comment-list .comment-item {
            padding: 6px;background:var(--card-color);
            border-radius:4px;margin-bottom:4px;
            font-size: clamp(12px,0.9vw,14px);
        }
        .comment-name {font-size: clamp(11px,0.8vw,13px);color:#72624c;margin-bottom:2px;}
        .author-tag {color:var(--author-color);font-weight:bold;margin-left:4px;}
        .reply-btn,.del-cmt-btn {
            font-size: clamp(11px,0.8vw,13px);
            color:#666;cursor:pointer;margin-left:6px;
        }

        .comment-area {
            padding: clamp(8px,1.2vw,12px);
            border-top:1px solid var(--border-color);
            background:#fbf8f2;flex-shrink:0;
        }
        .comment-title {font-size: clamp(14px,1.1vw,16px);margin-bottom:8px;}
        .input-box {display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
        #nickname {
            width: clamp(70px,8vw,90px);padding:6px;
            border:1px solid #ddd3c2;border-radius:4px;
            font-size: clamp(13px,1vw,15px);outline:none;
        }
        #comment-input {flex:1;min-height:36px;}
        .submit-btn {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            background: var(--theme-color);border:1px solid var(--border-color);
            border-radius:4px;cursor:pointer;font-size: clamp(12px,0.9vw,14px);
        }
        .comment-item {
            padding: clamp(6px,1vw,10px);background:var(--card-color);
            border-radius:6px;margin-bottom:8px;border:1px solid var(--border-color);
            font-size: clamp(12px,0.9vw,14px);
        }

        .modal-mask {
            position: fixed;inset:0;
            background:rgba(0,0,0,0.2);display:none;
            align-items:center;justify-content:center;
            z-index:1000;padding:10px;
        }
        .modal-box {
            background:var(--card-color);padding: clamp(12px,2vw,18px);
            border-radius:6px;border:1px solid var(--border-color);
            width:100%;max-width:500px;
        }
        .modal-box input,.modal-box select {
            width:100%;padding:6px;margin:6px 0;
            border:1px solid var(--border-color);border-radius:4px;
            font-size: clamp(13px,1vw,15px);
        }
        .modal-btn {
            padding: clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);
            border:1px solid var(--border-color);border-radius:4px;
            background:var(--theme-color);cursor:pointer;
            font-size: clamp(12px,0.9vw,14px);margin-right:6px;
        }
        .indent-check {margin:6px 0;font-size: clamp(13px,1vw,15px);}

        button,div[onclick]{
            -webkit-tap-highlight-color:transparent;
            touch-action:manipulation;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h3>分类</h3>
        <div id="categoryList"></div>
        <button class="add-category-btn author-ctrl" onclick="openCategoryModal()">新增分类</button>

        <h3>阅读状态</h3>
        <div class="status-item active" data-status="all" onclick="filterByStatus('all')">全部</div>
        <div class="status-item" data-status="unread" onclick="filterByStatus('unread')">未读</div>
        <div class="status-item" data-status="reading" onclick="filterByStatus('reading')">在读</div>
        <div class="status-item" data-status="finished" onclick="filterByStatus('finished')">已读完</div>
    </div>

    <div class="main-area">
        <div class="bookshelf-view" style="height:100%;display:flex;flex-direction:column;">
            <div class="top-bar">
                <h1>文章书架</h1>
                <div>
                    <button id="modeToggleBtn" onclick="toggleMode()">作者模式</button>
                    <div class="author-ctrl">
                        <button onclick="openNewArticleModal()">新增文章</button>
                        <button onclick="exportData()">导出数据</button>
                        <button onclick="importData()">导入数据</button>
                    </div>
                </div>
            </div>
            <div class="search-wrap">
                <input id="searchInput" placeholder="搜索标题">
                <button class="search-btn" onclick="searchArticle()">搜索</button>
            </div>
            <div class="article-grid" id="articleGrid"></div>
        </div>

        <div class="reader-view" id="readerView">
            <div class="reader-header">
                <button class="back-btn" onclick="goBack()">返回</button>
                <input type="text" class="article-title-input" id="readerTitle" readonly>
                <div class="status-set-box">
                    <button class="status-set-btn" onclick="setArticleStatus('unread')">未读</button>
                    <button class="status-set-btn" onclick="setArticleStatus('reading')">在读</button>
                    <button class="status-set-btn" onclick="setArticleStatus('finished')">已读</button>
                </div>
                <div class="author-ctrl">
                    <button onclick="toggleEdit()">编辑</button>
                </div>
            </div>
            <div class="reader-content">
                <div id="articleBodyContainer" class="article-body-container"></div>
            </div>
            <div class="comment-area">
                <h3 class="comment-title">评价</h3>
                <div class="input-box">
                    <input id="nickname" placeholder="昵称">
                    <textarea id="comment-input" placeholder="写下感想"></textarea>
                    <button class="submit-btn" onclick="addComment()">发布</button>
                </div>
                <div id="commentList"></div>
            </div>
        </div>
    </div>
</div>

<!-- 弹窗 -->
<div class="modal-mask" id="categoryModal"><div class="modal-box"><div>新增分类</div><input type="text" id="newCategoryName"><div style="margin-top:8px;"><button class="modal-btn" onclick="addCategory()">确定</button><button class="modal-btn" onclick="closeCategoryModal()">取消</button></div></div></div>
<div class="modal-mask" id="editCateModal"><div class="modal-box"><div>修改分类名称</div><input type="text" id="editCateName"><div style="margin-top:8px;"><button class="modal-btn" onclick="saveCateEdit()">确定</button><button class="modal-btn" onclick="closeCateEditModal()">取消</button></div></div></div>
<div class="modal-mask" id="articleModal"><div class="modal-box"><div>新增文章</div><input type="text" id="newArticleTitle"><div style="margin-top:8px;"><button class="modal-btn" onclick="addArticle()">确定</button><button class="modal-btn" onclick="closeArticleModal()">取消</button></div></div></div>
<div class="modal-mask" id="moveModal"><div class="modal-box"><div>移动分类</div><select id="moveCategorySelect"></select><div style="margin-top:8px;"><button class="modal-btn" onclick="confirmMoveArticle()">确定</button><button class="modal-btn" onclick="closeMoveModal()">取消</button></div></div></div>
<div class="modal-mask" id="pwdModal"><div class="modal-box"><div>输入作者密码</div><input type="password" id="pwdInput" placeholder="请输入密码"><div style="margin-top:8px;"><button class="modal-btn" onclick="checkPwd()">解锁</button><button class="modal-btn" onclick="closePwdModal()">取消</button></div></div></div>
<div class="modal-mask" id="editModal"><div class="modal-box"><div>编辑内容</div><textarea id="editContent" style="width:100%;height:220px;margin:8px 0;"></textarea><div class="indent-check"><label><input type="checkbox" id="indentSwitch"> 全文首行缩进两格</label></div><div style="margin-top:8px;"><button class="modal-btn" onclick="saveEditContent()">保存</button><button class="modal-btn" onclick="closeEditModal()">取消</button></div></div></div>

<!-- 导入文件框 -->
<input type="file" id="importFile" style="display:none" accept=".json">

<script>
const STORAGE_KEY = "article_shelf_data";
const AUTHOR_PWD = "123456";

let isAuthor = false, hasAuthorAuth = false;
let currentCategoryId = null, currentArticleId = null;
let currentFilterStatus = "all";
let editCateId = "";

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
    categories: [{ id: "default", name: "默认分类" }],
    articles: [],
    comments: [],
    inlineComments: {}
};

// ========== 导出 / 导入 核心功能 ==========
function exportData() {
    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "书架数据.json";
    a.click();
    URL.revokeObjectURL(url);
    alert("导出成功！发送到手机即可导入");
}

function importData() {
    document.getElementById("importFile").click();
}

document.getElementById("importFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            data = JSON.parse(ev.target.result);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            alert("导入成功！刷新页面");
            location.reload();
        } catch (e) {
            alert("导入失败");
        }
    };
    reader.readAsText(file);
});

// 初始化
window.onload = () => {
    currentCategoryId = data.categories[0].id;
    renderCategories();
    renderArticles();
};

function searchArticle(){renderArticles();}

function toggleMode() {
    if (!hasAuthorAuth) { document.getElementById("pwdModal").style.display = "flex"; return; }
    isAuthor = !isAuthor;
    document.querySelectorAll(".author-ctrl").forEach(e => e.style.display = isAuthor ? "block" : "none");
    document.querySelectorAll(".article-actions").forEach(e => e.style.display = isAuthor ? "flex" : "none");
    document.getElementById("modeToggleBtn").innerText = isAuthor ? "读者模式" : "作者模式";
}

function checkPwd() {
    if (document.getElementById("pwdInput").value === AUTHOR_PWD) {
        hasAuthorAuth = true; toggleMode(); closePwdModal(); alert("解锁成功");
    } else alert("密码错误");
}
function closePwdModal() { 
    document.getElementById("pwdModal").style.display = "none";
    document.getElementById("pwdInput").value = "";
}

// 分类
function openCategoryModal(){document.getElementById("categoryModal").style.display="flex";}
function closeCategoryModal(){document.getElementById("categoryModal").style.display="none";}
function addCategory(){
    const name = document.getElementById("newCategoryName").value.trim();
    if(!name)return;
    data.categories.push({id:Date.now().toString(),name});
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    renderCategories();closeCategoryModal();
}

// 修改分类名称
function openEditCateModal(id,name){
    editCateId = id;
    document.getElementById("editCateName").value = name;
    document.getElementById("editCateModal").style.display = "flex";
}
function closeCateEditModal(){
    document.getElementById("editCateModal").style.display = "none";
}
function saveCateEdit(){
    const newName = document.getElementById("editCateName").value.trim();
    if(!newName) return;
    let idx = data.categories.findIndex(item=>item.id === editCateId);
    if(idx > -1){
        data.categories[idx].name = newName;
        localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
        renderCategories();
    }
    closeCateEditModal();
}

function renderCategories(){
    const el = document.getElementById("categoryList");el.innerHTML="";
    data.categories.forEach(c=>{
        const d = document.createElement("div");
        d.className = "category-item"+(c.id===currentCategoryId?" active":"");
        d.innerHTML = `${c.name}<span class="cate-edit-btn" onclick="openEditCateModal('${c.id}','${c.name}')">编辑</span>`;
        d.onclick=(e)=>{
            if(e.target.classList.contains("cate-edit-btn")) return;
            currentCategoryId=c.id;renderArticles();renderCategories();
        };
        el.appendChild(d);
    });
}

// 状态筛选
function filterByStatus(s){
    currentFilterStatus=s;
    document.querySelectorAll(".status-item").forEach(i=>i.classList.toggle("active",i.dataset.status===s));
    renderArticles();
}
function setArticleStatus(status){
    const idx = data.articles.findIndex(a=>a.id===currentArticleId);
    if(idx>-1)data.articles[idx].status=status;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    alert("状态已保存");
}

// 移动文章
function openMoveModal(id){
    currentArticleId=id;
    const sel = document.getElementById("moveCategorySelect");sel.innerHTML="";
    data.categories.forEach(c=>sel.options.add(new Option(c.name,c.id)));
    document.getElementById("moveModal").style.display="flex";
}
function closeMoveModal(){document.getElementById("moveModal").style.display="none";}
function confirmMoveArticle(){
    const tid = document.getElementById("moveCategorySelect").value;
    const idx = data.articles.findIndex(a=>a.id===currentArticleId);
    if(idx>-1)data.articles[idx].categoryId=tid;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    renderArticles();closeMoveModal();
}

// 文章
function openNewArticleModal(){document.getElementById("articleModal").style.display="flex";}
function closeArticleModal(){document.getElementById("articleModal").style.display="none";}
function addArticle(){
    const title = document.getElementById("newArticleTitle").value.trim();
    if(!title)return;
    data.articles.push({
        id:Date.now().toString(),
        categoryId:currentCategoryId,
        title,content:"",status:"unread"
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    renderArticles();closeArticleModal();
}
function renderArticles(){
    const g = document.getElementById("articleGrid");g.innerHTML="";
    const key = document.getElementById("searchInput").value.toLowerCase();
    let list = data.articles.filter(a=>a.categoryId===currentCategoryId);
    if(key)list=list.filter(a=>a.title.toLowerCase().includes(key));
    if(currentFilterStatus!=="all")list.filter(a=>a.status===currentFilterStatus);
    list.forEach(art=>{
        const card = document.createElement("div");card.className="article-card";
        card.innerHTML=`<div class="article-cover">${art.title}</div>
            <div class="article-info">
                <div class="article-title">${art.title}</div>
                <div class="article-actions" style="display:${isAuthor?"flex":"none"}">
                    <button class="move-btn" onclick="openMoveModal('${art.id}')">移动</button>
                    <button class="del-btn" onclick="deleteArticle('${art.id}')">删除</button>
                </div>
            </div>`;
        card.onclick=e=>{
            if(!e.target.classList.contains("del-btn")&&!e.target.classList.contains("move-btn"))openReader(art.id);
        };
        g.appendChild(card);
    });
}
function deleteArticle(id){
    if(!confirm("确定删除？"))return;
    data.articles=data.articles.filter(a=>a.id!==id);
    data.comments=data.comments.filter(c=>c.articleId!==id);
    delete data.inlineComments[id];
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    renderArticles();
}

// 阅读
function openReader(id){
    currentArticleId=id;
    const art = data.articles.find(a=>a.id===id);
    document.getElementById("readerTitle").value=art.title;
    document.querySelector(".bookshelf-view").style.display="none";
    document.getElementById("readerView").style.display="flex";
    renderArticleBody(art);
    renderComments();
}
function renderArticleBody(art){
    const cont = document.getElementById("articleBodyContainer");
    const content = art.content||"";
    const ps = content.split("\n");
    cont.innerHTML="";
    ps.forEach((p,idx)=>{
        const pEl = document.createElement("div");
        pEl.className="article-paragraph";
        pEl.id=`para-${idx}`;
        pEl.textContent=p;
        const cbox = document.createElement("div");
        cbox.className="inline-comment-box";
        cbox.id=`comment-box-${idx}`;
        cbox.style.display="none";
        cbox.innerHTML=`<button class="close-comment-btn" onclick="closeInlineComment(${idx})">×</button>
            <textarea placeholder="段落评价"></textarea>
            <button class="submit-btn" onclick="addInlineComment(${idx})">提交</button>
            <div class="inline-comment-list" id="inline-comment-list-${idx}"></div>`;
        cont.appendChild(pEl);
        cont.appendChild(cbox);
    });
    showInlineComments();
    cont.onmouseup=()=>{
        const s = window.getSelection();
        const t = s.toString().trim();
        if(!t)return;
        const r = s.getRangeAt(0);
        const para = r.startContainer.parentElement.closest(".article-paragraph");
        if(!para)return;
        const idx = para.id.split("-")[1];
        document.getElementById(`comment-box-${idx}`).style.display="block";
        const span = document.createElement("span");
        span.className="highlight-text";
        span.textContent=t;
        r.deleteContents();
        r.insertNode(span);
        s.removeAllRanges();
    };
}
function closeInlineComment(idx){
    document.getElementById(`comment-box-${idx}`).style.display="none";
}
function addInlineComment(idx){
    const box = document.getElementById(`comment-box-${idx}`);
    const txt = box.querySelector("textarea").value.trim();
    const nick = document.getElementById("nickname").value||"匿名";
    if(!txt)return;
    if(!data.inlineComments[currentArticleId])data.inlineComments[currentArticleId]={};
    if(!data.inlineComments[currentArticleId][idx])data.inlineComments[currentArticleId][idx]=[];
    data.inlineComments[currentArticleId][idx].push({nickname:nick,content:txt,isAuthor:false});
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    box.querySelector("textarea").value="";
    showInlineComments();
}
function showInlineComments(){
    document.querySelectorAll(".inline-comment-list").forEach(e=>e.innerHTML="");
    const ic = data.inlineComments[currentArticleId];
    if(!ic)return;
    for(const idx in ic){
        const el = document.getElementById(`inline-comment-list-${idx}`);
        if(!el)continue;
        ic[idx].forEach((c,i)=>{
            el.innerHTML+=`<div class="comment-item">
                <div class="comment-name">${c.nickname} ${c.isAuthor?'<span class="author-tag">作者</span>':''}
                ${isAuthor?'<span class="del-cmt-btn" onclick="delInlineComment('+idx+','+i+')">删除</span>':''}</div>
                <div>${c.content}</div></div>`;
        });
    }
}
function delInlineComment(idx,i){
    if(!confirm("删除该段落评论？"))return;
    data.inlineComments[currentArticleId][idx].splice(i,1);
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    showInlineComments();
}

function goBack(){
    document.getElementById("readerView").style.display="none";
    document.querySelector(".bookshelf-view").style.display="flex";
}

// 编辑
function toggleEdit(){
    const art = data.articles.find(a=>a.id===currentArticleId);
    document.getElementById("editContent").value=art.content;
    document.getElementById("indentSwitch").checked=false;
    document.getElementById("editModal").style.display="flex";
}
function closeEditModal(){document.getElementById("editModal").style.display="none";}
function saveEditContent(){
    let content = document.getElementById("editContent").value;
    if(document.getElementById("indentSwitch").checked)content=content.replace(/^/gm,"　　");
    const idx = data.articles.findIndex(a=>a.id===currentArticleId);
    data.articles[idx].content=content;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    closeEditModal();
    openReader(currentArticleId);
}

// 评论
function addComment(){
    const nick = document.getElementById("nickname").value||"匿名";
    const txt = document.getElementById("comment-input").value.trim();
    if(!txt||!currentArticleId)return;
    data.comments.push({id:Date.now().toString(),articleId:currentArticleId,user:nick,content:txt});
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    document.getElementById("comment-input").value="";
    renderComments();
}
function renderComments(){
    const el = document.getElementById("commentList");el.innerHTML="";
    data.comments.filter(c=>c.articleId===currentArticleId).forEach(c=>{
        el.innerHTML+=`<div class="comment-item">
            <div class="comment-name">${c.user} ${isAuthor?'<span class="del-cmt-btn" onclick="delComment(\''+c.id+'\')">删除</span>':''}</div>
            <div>${c.content}</div></div>`;
    });
}
function delComment(id){
    if(!confirm("删除评论？"))return;
    data.comments=data.comments.filter(c=>c.id!==id);
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
    renderComments();
}

document.getElementById("searchInput").addEventListener("keydown",e=>{
    if(e.key==="Enter")searchArticle();
});
</script>
</body>
