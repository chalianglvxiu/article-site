<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的CP文章书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: SimSun, "宋体", serif;
        }
        body {
            background: #f0efe4;
            color: #333;
        }
        .container {
            display: flex;
            height: 100vh;
        }

        /* 左侧CP分类栏 */
        .sidebar {
            width: 180px;
            background: #f5f1e9;
            border-right: 1px solid #e0d9cb;
            padding: 15px 10px;
            overflow-y: auto;
        }
        .sidebar h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #554b3d;
            font-weight: normal;
        }
        .category-item {
            padding: 8px 10px;
            margin-bottom: 8px;
            background: #fffdf9;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid transparent;
        }
        .category-item:hover, .category-item.active {
            border-color: #c9c2b4;
            background: #efe9dd;
        }
        .add-category-btn {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            border: 1px dashed #c9c2b4;
            border-radius: 4px;
            background: transparent;
            color: #665845;
            cursor: pointer;
            font-size: 14px;
        }
        .add-category-btn:hover {
            background: #efe9dd;
        }

        /* 右侧文章卡片区 */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background: #eae5dd;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar h1 {
            color: #443c30;
            font-size: 18px;
            font-weight: normal;
        }
        .top-bar button {
            padding: 6px 12px;
            border: 1px solid #c9c2b4;
            border-radius: 4px;
            background: #f3efe6;
            color: #443c30;
            cursor: pointer;
            font-size: 14px;
        }
        .author-ctrl {
            display: none;
        }
        .article-grid {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .article-card {
            background: #fffdf9;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #e0d9cb;
            transition: 0.2s;
        }
        .article-cover {
            height: 180px;
            background: linear-gradient(135deg, #e8e2d5, #fffdf9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #665845;
            font-size: 14px;
        }
        .article-info {
            padding: 10px;
            font-size: 13px;
        }
        .article-title {
            font-weight: normal;
            margin-bottom: 4px;
        }
        .article-actions {
            display: none;
            margin-top: 5px;
        }
        .del-btn {
            color: #995544;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }

        /* 文章阅读页面 */
        .reader-view {
            flex: 1;
            display: none;
            flex-direction: column;
            background: #fffdf9;
        }
        .reader-header {
            background: #eae5dd;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-btn {
            padding: 6px 12px;
            border: 1px solid #c9c2b4;
            border-radius: 4px;
            background: #f3efe6;
            color: #443c30;
            cursor: pointer;
            font-size: 14px;
        }
        .reader-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .article-title-input {
            width: 100%;
            font-size: 22px;
            border: none;
            outline: none;
            margin-bottom: 15px;
            color: #332b20;
            background: transparent;
        }
        .article-body {
            width: 100%;
            min-height: 400px;
            line-height: 1.9;
            font-size: 16px;
            color: #333;
            border: none;
            outline: none;
            resize: none;
            white-space: pre-wrap;
            background: transparent;
        }

        /* 评论区 */
        .comment-area {
            padding: 20px;
            border-top: 1px solid #e0d9cb;
            background: #fbf8f2;
        }
        .comment-title {
            font-size: 17px;
            margin-bottom: 12px;
            color: #443c30;
            font-weight: normal;
        }
        .input-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        #nickname {
            width: 100px;
            padding: 8px;
            border: 1px solid #ddd3c2;
            border-radius: 4px;
            outline: none;
            background: #fffdf9;
            font-size: 14px;
        }
        #comment-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd3c2;
            border-radius: 4px;
            outline: none;
            resize: none;
            min-height: 40px;
            background: #fffdf9;
            font-size: 14px;
        }
        .submit-btn {
            padding: 0 15px;
            background: #eae5dd;
            color: #443c30;
            border: 1px solid #c9c2b4;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .comment-item {
            padding: 12px;
            background: #fffdf9;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid #f0e9df;
            font-size: 14px;
        }
        .comment-name {
            color: #72624c;
            margin-bottom: 4px;
            font-size: 13px;
        }

        /* 弹窗 */
        .modal-mask {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: #fffdf9;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e0d9cb;
        }
        .modal-box input {
            padding: 6px;
            margin: 8px 0;
            border: 1px solid #ddd3c2;
            border-radius: 4px;
            font-family: SimSun;
        }
        .modal-btn {
            padding: 6px 12px;
            border: 1px solid #c9c2b4;
            border-radius: 4px;
            background: #f3efe6;
            color: #443c30;
            cursor: pointer;
            font-family: SimSun;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 左侧CP分类栏 -->
    <div class="sidebar">
        <h3>CP分类</h3>
        <div id="categoryList"></div>
        <button class="add-category-btn author-ctrl" onclick="openCategoryModal()">+ 新增CP分类</button>
    </div>

    <!-- 右侧主区域 -->
    <div class="main-area">
        <!-- 书架页面 -->
        <div class="bookshelf-view">
            <div class="top-bar">
                <h1>我的CP文章书架</h1>
                <div>
                    <button id="modeToggleBtn" onclick="toggleMode()">进入作者模式</button>
                    <div class="author-ctrl">
                        <button onclick="openNewArticleModal()">新增文章</button>
                    </div>
                </div>
            </div>
            <div class="article-grid" id="articleGrid"></div>
        </div>

        <!-- 文章阅读页面 -->
        <div class="reader-view" id="readerView">
            <div class="reader-header">
                <button class="back-btn" onclick="goBack()">← 返回书架</button>
                <input type="text" class="article-title-input" id="readerTitle" placeholder="文章标题" readonly>
                <div class="author-ctrl">
                    <button onclick="toggleEdit()">编辑文章</button>
                    <button onclick="saveArticle()">保存文章</button>
                </div>
            </div>
            <div class="reader-content">
                <textarea class="article-body" id="readerBody" placeholder="文章内容..." readonly></textarea>
            </div>
            <div class="comment-area">
                <h3 class="comment-title">留言评论</h3>
                <div class="input-box">
                    <input id="nickname" placeholder="昵称">
                    <textarea id="comment-input" placeholder="写下评论"></textarea>
                    <button class="submit-btn" onclick="addComment()">发布</button>
                </div>
                <div id="commentList"></div>
            </div>
        </div>
    </div>
</div>

<!-- 新增CP分类弹窗 -->
<div class="modal-mask" id="categoryModal">
    <div class="modal-box">
        <div>新增CP分类</div>
        <input type="text" id="newCategoryName" placeholder="CP名称（如AB/CD）">
        <br>
        <button class="modal-btn" onclick="addCategory()">确认添加</button>
        <button class="modal-btn" onclick="closeCategoryModal()">取消</button>
    </div>
</div>

<!-- 新增文章弹窗 -->
<div class="modal-mask" id="articleModal">
    <div class="modal-box">
        <div>新增文章</div>
        <input type="text" id="newArticleTitle" placeholder="文章标题">
        <br>
        <button class="modal-btn" onclick="addArticle()">确认添加</button>
        <button class="modal-btn" onclick="closeArticleModal()">取消</button>
    </div>
</div>

<!-- 密码弹窗 -->
<div class="modal-mask" id="pwdModal">
    <div class="modal-box">
        <div>输入作者密码解锁管理权限</div>
        <input type="password" id="pwdInput" placeholder="请输入密码">
        <br>
        <button class="modal-btn" onclick="checkPwd()">确认解锁</button>
        <button class="modal-btn" onclick="closePwdModal()">取消</button>
    </div>
</div>

<script>
    const STORAGE_KEY = "cp_article_shelf";
    const AUTHOR_PWD = "123456";
    let isAuthor = false;
    let hasAuthorAuth = false;
    let currentCategoryId = null;
    let currentArticleId = null;

    let platformData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        categories: [],
        articles: [],
        comments: []
    };

    // --- 模式切换 ---
    function toggleMode() {
        if (!hasAuthorAuth) {
            document.getElementById("pwdModal").style.display = "flex";
            return;
        }
        isAuthor = !isAuthor;
        document.querySelectorAll(".author-ctrl").forEach(el => {
            el.style.display = isAuthor ? "block" : "none";
        });
        document.querySelectorAll(".article-actions").forEach(el => {
            el.style.display = isAuthor ? "block" : "none";
        });
        document.getElementById("modeToggleBtn").innerText = isAuthor ? "进入读者模式" : "进入作者模式";
    }
    function checkPwd() {
        if (document.getElementById("pwdInput").value.trim() === AUTHOR_PWD) {
            hasAuthorAuth = true;
            toggleMode();
            closePwdModal();
            alert("已进入作者模式");
        } else {
            alert("密码错误");
        }
    }
    function closePwdModal() {
        document.getElementById("pwdModal").style.display = "none";
    }

    // --- CP分类管理 ---
    function openCategoryModal() {
        document.getElementById("categoryModal").style.display = "flex";
        document.getElementById("newCategoryName").value = "";
    }
    function closeCategoryModal() {
        document.getElementById("categoryModal").style.display = "none";
    }
    function addCategory() {
        const name = document.getElementById("newCategoryName").value.trim();
        if (!name) return alert("请输入CP名称");
        const newId = Date.now().toString();
        platformData.categories.push({ id: newId, name });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        renderCategories();
        closeCategoryModal();
    }
    function renderCategories() {
        const listEl = document.getElementById("categoryList");
        listEl.innerHTML = "";
        platformData.categories.forEach(cat => {
            const item = document.createElement("div");
            item.className = "category-item" + (cat.id === currentCategoryId ? " active" : "");
            item.innerText = cat.name;
            item.onclick = () => selectCategory(cat.id);
            listEl.appendChild(item);
        });
    }
    function selectCategory(id) {
        currentCategoryId = id;
        renderArticles();
        renderCategories();
    }

    // --- 文章管理 ---
    function openNewArticleModal() {
        if (!currentCategoryId) return alert("请先选择一个CP分类");
        document.getElementById("articleModal").style.display = "flex";
        document.getElementById("newArticleTitle").value = "";
    }
    function closeArticleModal() {
        document.getElementById("articleModal").style.display = "none";
    }
    function addArticle() {
        const title = document.getElementById("newArticleTitle").value.trim();
        if (!title) return alert("请输入文章标题");
        const newId = Date.now().toString();
        platformData.articles.push({
            id: newId,
            categoryId: currentCategoryId,
            title,
            content: ""
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        renderArticles();
        closeArticleModal();
    }
    function renderArticles() {
        const gridEl = document.getElementById("articleGrid");
        gridEl.innerHTML = "";
        const filtered = platformData.articles.filter(a => a.categoryId === currentCategoryId);
        filtered.forEach(art => {
            const card = document.createElement("div");
            card.className = "article-card";
            card.innerHTML = `
                <div class="article-cover">封面</div>
                <div class="article-info">
                    <div class="article-title">${art.title}</div>
                    <div class="article-actions">
                        <button class="del-btn" onclick="deleteArticle('${art.id}')">删除</button>
                    </div>
                </div>
            `;
            card.onclick = (e) => {
                if (e.target.classList.contains("del-btn")) return;
                openReader(art.id);
            };
            gridEl.appendChild(card);
        });
        document.querySelectorAll(".article-actions").forEach(el => {
            el.style.display = isAuthor ? "block" : "none";
        });
    }
    function deleteArticle(id) {
        if (!confirm("确定删除这篇文章？")) return;
        platformData.articles = platformData.articles.filter(a => a.id !== id);
        platformData.comments = platformData.comments.filter(c => c.articleId !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        renderArticles();
    }

    // --- 阅读/编辑文章 ---
    function openReader(id) {
        currentArticleId = id;
        const art = platformData.articles.find(a => a.id === id);
        if (!art) return;
        document.getElementById("readerTitle").value = art.title;
        document.getElementById("readerBody").value = art.content;
        document.querySelector(".bookshelf-view").style.display = "none";
        document.getElementById("readerView").style.display = "flex";
        renderComments();
    }
    function goBack() {
        document.getElementById("readerView").style.display = "none";
        document.querySelector(".bookshelf-view").style.display = "block";
        currentArticleId = null;
    }
    function toggleEdit() {
        if (!isAuthor) return alert("无编辑权限");
        const bodyEl = document.getElementById("readerBody");
        const titleEl = document.getElementById("readerTitle");
        const readOnly = bodyEl.readOnly;
        bodyEl.readOnly = !readOnly;
        titleEl.readOnly = !readOnly;
        alert(readOnly ? "已开启编辑模式" : "已关闭编辑模式");
    }
    function saveArticle() {
        if (!isAuthor || !currentArticleId) return;
        const title = document.getElementById("readerTitle").value.trim();
        const content = document.getElementById("readerBody").value.trim();
        const idx = platformData.articles.findIndex(a => a.id === currentArticleId);
        if (idx !== -1) {
            platformData.articles[idx].title = title;
            platformData.articles[idx].content = content;
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        alert("保存成功");
    }

    // --- 评论功能 ---
    function addComment() {
        const nick = document.getElementById("nickname").value.trim() || "匿名";
        const text = document.getElementById("comment-input").value.trim();
        if (!text || !currentArticleId) return alert("请输入评论内容");
        platformData.comments.push({
            id: Date.now().toString(),
            articleId: currentArticleId,
            user: nick,
            content: text,
            time: new Date().toLocaleString()
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        document.getElementById("comment-input").value = "";
        renderComments();
    }
    function renderComments() {
        const listEl = document.getElementById("commentList");
        listEl.innerHTML = "";
        const comments = platformData.comments.filter(c => c.articleId === currentArticleId);
        comments.forEach(c => {
            listEl.innerHTML += `
                <div class="comment-item">
                    <div class="comment-name">${c.user} · ${c.time}</div>
                    <div>${c.content}</div>
                </div>
            `;
        });
    }

    // 初始化
    window.onload = function() {
        if (platformData.categories.length === 0) {
            platformData.categories.push({ id: "default", name: "默认CP" });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        }
        currentCategoryId = platformData.categories[0].id;
        renderCategories();
        renderArticles();
    }
</script>
</body>
</html>
