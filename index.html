<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的CP文章书架</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: SimSun, "宋体", serif;
        }
        body {
            background: #f0efe4;
            color: #333;
        }
        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 180px;
            background: #f5f1e9;
            border-right: 1px solid #e0d9cb;
            padding: 15px 10px;
            overflow-y: auto;
        }
        .sidebar h3 {
            font-size: 16px;
            margin: 15px 0 10px;
            color: #554b3d;
            font-weight: normal;
        }
        .sidebar h3:first-child{margin-top:0;}
        .category-item, .status-item {
            padding: 8px 10px;
            margin-bottom: 8px;
            background: #fffdf9;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid transparent;
        }
        .category-item:hover, .category-item.active,
        .status-item:hover, .status-item.active {
            border-color: #c9c2b4;
            background: #efe9dd;
        }
        .add-category-btn {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            border: 1px dashed #c9c2b4;
            border-radius: 4px;
            background: transparent;
            color: #665845;
            cursor: pointer;
            font-size: 14px;
        }
        .add-category-btn:hover {
            background: #efe9dd;
        }

        .search-wrap{
            padding:10px 20px;
            background:#eae5dd;
            display:flex;
            gap:8px;
        }
        #searchInput{
            flex:1;
            padding:6px 10px;
            border:1px solid #c9c2b4;
            border-radius:4px;
            outline:none;
        }
        .search-btn{
            padding:6px 12px;
            border:1px solid #c9c2b4;
            border-radius:4px;
            background:#f3efe6;
            cursor:pointer;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background: #eae5dd;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar h1 {
            color: #443c30;
            font-size: 18px;
            font-weight: normal;
        }
        .top-bar button {
            padding: 6px 12px;
            border: 1px solid #c9c2b4;
            border-radius: 4px;
            background: #f3efe6;
            color: #443c30;
            cursor: pointer;
            font-size: 14px;
        }
        .author-ctrl {
            display: none;
        }
        .article-grid {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .article-card {
            background: #fffdf9;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #e0d9cb;
            transition: 0.2s;
        }
        .article-cover {
            height: 180px;
            background: #f8f5ee;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #443c30;
            font-size: 15px;
            text-align: center;
            padding: 10px;
        }
        .article-info {
            padding: 10px;
            font-size: 13px;
        }
        .article-title {
            font-weight: normal;
            margin-bottom: 4px;
        }
        .article-actions {
            margin-top: 5px;
            display: flex;
            gap:5px;
        }
        .del-btn,.move-btn {
            color: #995544;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }

        .reader-view {
            flex: 1;
            display: none;
            flex-direction: column;
            background: #fffdf9;
            overflow: hidden;
        }
        .reader-header {
            background: #eae5dd;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap:wrap;
            flex-shrink: 0;
        }
        .back-btn {
            padding: 6px 12px;
            border: 1px solid #c9c2b4;
            border-radius: 4px;
            background: #f3efe6;
            color: #443c30;
            cursor: pointer;
            font-size: 14px;
        }
        .status-set-box{
            display:flex;
            gap:6px;
        }
        .status-set-btn{
            padding:4px 8px;
            border:1px solid #c9c2b4;
            border-radius:3px;
            background:#f3efe6;
            font-size:12px;
            cursor:pointer;
        }
        .reader-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .article-title-input {
            width: 100%;
            font-size: 22px;
            border: none;
            outline: none;
            margin-bottom: 15px;
            color: #332b20;
            background: transparent;
        }
        .article-body-container {
            line-height: 1.9;
            font-size: 16px;
            color: #333;
        }
        .article-paragraph {
            margin-bottom: 10px;
        }
        .article-paragraph.indent {
            text-indent: 2em;
        }
        .highlight-text {
            background-color: #fff3cd;
            padding: 0 2px;
            border-radius: 2px;
        }
        .inline-comment-box {
            margin: 10px 0 20px 0;
            padding: 10px;
            background: #f8f5ee;
            border-radius: 4px;
            border-left: 3px solid #d4b886;
            position: relative;
        }
        .close-comment-btn {
            position: absolute;
            top: 6px;
            right: 8px;
            background: transparent;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #666;
        }
        .inline-comment-box textarea {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd3c2;
            border-radius: 4px;
            margin-bottom: 6px;
            resize: none;
        }
        .inline-comment-list .comment-item {
            padding: 8px;
            background: #fff;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 14px;
            position: relative;
        }
        .inline-comment-list .comment-name {
            font-size: 12px;
            color: #72624c;
            margin-bottom: 3px;
        }
        .author-tag {
            color: #b35050;
            font-weight: bold;
            margin-left: 5px;
        }
        .reply-btn,.del-cmt-btn {
            font-size: 12px;
            color: #666;
            cursor: pointer;
            margin-left: 8px;
        }
        .reply-box {
            margin-top: 5px;
            display: none;
        }

        .comment-area {
            padding: 20px;
            border-top: 1px solid #e0d9cb;
            background: #fbf8f2;
            flex-shrink: 0;
        }
        .comment-title {
            font-size: 17px;
            margin-bottom: 12px;
            color: #443c30;
            font-weight: normal;
        }
        .input-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        #nickname {
            width: 100px;
            padding: 8px;
            border: 1px solid #ddd3c2;
            border-radius: 4px;
            outline: none;
            background: #fffdf9;
            font-size: 14px;
        }
        #comment-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd3c2;
            border-radius: 4px;
            outline: none;
            resize: none;
            min-height: 40px;
            background: #fffdf9;
            font-size: 14px;
        }
        .submit-btn {
            padding: 0 15px;
            background: #eae5dd;
            color: #443c30;
            border: 1px solid #c9c2b4;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .comment-item {
            padding: 12px;
            background: #fffdf9;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid #f0e9df;
            font-size: 14px;
            position: relative;
        }
        .comment-name {
            color: #72624c;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .modal-mask {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: #fffdf9;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e0d9cb;
        }
        .modal-box input,.modal-box select {
            padding: 6px;
            margin: 8px 0;
            border: 1px solid #ddd3c2;
            border-radius: 4px;
            font-family: SimSun;
            min-width:200px;
        }
        .modal-btn {
            padding: 6px 12px;
            border: 1px solid #c9c2b4;
            border-radius: 4px;
            background: #f3efe6;
            color: #443c30;
            cursor: pointer;
            font-family: SimSun;
            margin-right:8px;
        }
        .indent-check {
            margin:8px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h3>CP分类</h3>
        <div id="categoryList"></div>
        <button class="add-category-btn author-ctrl" onclick="openCategoryModal()">+ 新增CP分类</button>

        <h3>阅读状态</h3>
        <div class="status-item active" data-status="all" onclick="filterByStatus('all')">全部文章</div>
        <div class="status-item" data-status="unread" onclick="filterByStatus('unread')">未读</div>
        <div class="status-item" data-status="reading" onclick="filterByStatus('reading')">在读</div>
        <div class="status-item" data-status="finished" onclick="filterByStatus('finished')">已读完</div>
    </div>

    <div class="main-area">
        <div class="bookshelf-view" style="height:100%;display:flex;flex-direction:column;">
            <div class="top-bar">
                <h1>我的CP文章书架</h1>
                <div>
                    <button id="modeToggleBtn" onclick="toggleMode()">进入作者模式</button>
                    <div class="author-ctrl">
                        <button onclick="openNewArticleModal()">新增文章</button>
                    </div>
                </div>
            </div>
            <div class="search-wrap">
                <input id="searchInput" placeholder="输入文章标题搜索">
                <button class="search-btn" onclick="searchArticle()">搜索</button>
            </div>
            <div class="article-grid" id="articleGrid"></div>
        </div>

        <div class="reader-view" id="readerView">
            <div class="reader-header">
                <button class="back-btn" onclick="goBack()">← 返回书架</button>
                <input type="text" class="article-title-input" id="readerTitle" placeholder="文章标题" readonly>
                <div class="status-set-box">
                    <span>设置状态：</span>
                    <button class="status-set-btn" onclick="setArticleStatus('unread')">未读</button>
                    <button class="status-set-btn" onclick="setArticleStatus('reading')">在读</button>
                    <button class="status-set-btn" onclick="setArticleStatus('finished')">已读完</button>
                </div>
                <div class="author-ctrl">
                    <button onclick="toggleEdit()">编辑文章</button>
                    <button onclick="saveArticle()">保存文章</button>
                </div>
            </div>
            <div class="reader-content">
                <div id="articleBodyContainer" class="article-body-container"></div>
            </div>
            <div class="comment-area">
                <h3 class="comment-title">文末整体评价</h3>
                <div class="input-box">
                    <input id="nickname" placeholder="昵称">
                    <textarea id="comment-input" placeholder="写下整体感想"></textarea>
                    <button class="submit-btn" onclick="addComment()">发布</button>
                </div>
                <div id="commentList"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-mask" id="categoryModal">
    <div class="modal-box">
        <div>新增CP分类</div>
        <input type="text" id="newCategoryName" placeholder="CP名称（如AB/CD）">
        <br>
        <button class="modal-btn" onclick="addCategory()">确认添加</button>
        <button class="modal-btn" onclick="closeCategoryModal()">取消</button>
    </div>
</div>

<div class="modal-mask" id="articleModal">
    <div class="modal-box">
        <div>新增文章</div>
        <input type="text" id="newArticleTitle" placeholder="文章标题">
        <br>
        <button class="modal-btn" onclick="addArticle()">确认添加</button>
        <button class="modal-btn" onclick="closeArticleModal()">取消</button>
    </div>
</div>

<div class="modal-mask" id="moveModal">
    <div class="modal-box">
        <div>移动文章至其他CP分类</div>
        <select id="moveCategorySelect"></select>
        <br>
        <button class="modal-btn" onclick="confirmMoveArticle()">确认移动</button>
        <button class="modal-btn" onclick="closeMoveModal()">取消</button>
    </div>
</div>

<div class="modal-mask" id="pwdModal">
    <div class="modal-box">
        <div>输入作者密码解锁管理权限</div>
        <input type="password" id="pwdInput" placeholder="请输入密码">
        <br>
        <button class="modal-btn" onclick="checkPwd()">确认解锁</button>
        <button class="modal-btn" onclick="closePwdModal()">取消</button>
    </div>
</div>

<div class="modal-mask" id="editModal">
    <div class="modal-box" style="width:600px;">
        <div>编辑文章内容</div>
        <textarea id="editContent" style="width:100%;height:300px;margin:10px 0;"></textarea>
        <div class="indent-check">
            <label><input type="checkbox" id="indentSwitch"> 全文首行缩进两格</label>
        </div>
        <button class="modal-btn" onclick="saveEditContent()">保存</button>
        <button class="modal-btn" onclick="closeEditModal()">取消</button>
    </div>
</div>

<script>
    const STORAGE_KEY = "cp_article_shelf";
    const AUTHOR_PWD = "123456";
    let isAuthor = false;
    let hasAuthorAuth = false;
    let currentCategoryId = null;
    let currentArticleId = null;
    let currentFilterStatus = "all";
    let inlineComments = {};

    let platformData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        categories: [],
        articles: [],
        comments: []
    };

    function searchArticle(){
        renderArticles();
    }

    function toggleMode() {
        if (!hasAuthorAuth) {
            document.getElementById("pwdModal").style.display = "flex";
            return;
        }
        isAuthor = !isAuthor;
        document.querySelectorAll(".author-ctrl").forEach(el => {
            el.style.display = isAuthor ? "block" : "none";
        });
        document.querySelectorAll(".article-actions").forEach(el => {
            el.style.display = isAuthor ? "flex" : "none";
        });
        document.getElementById("modeToggleBtn").innerText = isAuthor ? "进入读者模式" : "进入作者模式";
        openReader(currentArticleId);
    }
    function checkPwd() {
        if (document.getElementById("pwdInput").value.trim() === AUTHOR_PWD) {
            hasAuthorAuth = true;
            toggleMode();
            closePwdModal();
            alert("已进入作者模式");
        } else {
            alert("密码错误");
        }
    }
    function closePwdModal() {
        document.getElementById("pwdModal").style.display = "none";
    }

    function openCategoryModal() {
        document.getElementById("categoryModal").style.display = "flex";
        document.getElementById("newCategoryName").value = "";
    }
    function closeCategoryModal() {
        document.getElementById("categoryModal").style.display = "none";
    }
    function addCategory() {
        const name = document.getElementById("newCategoryName").value.trim();
        if (!name) return alert("请输入CP名称");
        const newId = Date.now().toString();
        platformData.categories.push({ id: newId, name });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        renderCategories();
        closeCategoryModal();
    }
    function renderCategories() {
        const listEl = document.getElementById("categoryList");
        listEl.innerHTML = "";
        platformData.categories.forEach(cat => {
            const item = document.createElement("div");
            item.className = "category-item" + (cat.id === currentCategoryId ? " active" : "");
            item.innerText = cat.name;
            item.onclick = () => selectCategory(cat.id);
            listEl.appendChild(item);
        });
    }
    function selectCategory(id) {
        currentCategoryId = id;
        renderArticles();
        renderCategories();
    }

    function filterByStatus(status){
        currentFilterStatus = status;
        document.querySelectorAll(".status-item").forEach(item=>{
            item.classList.toggle("active", item.dataset.status === status);
        });
        renderArticles();
    }
    function setArticleStatus(status){
        if(!currentArticleId)return;
        const idx = platformData.articles.findIndex(a=>a.id===currentArticleId);
        if(idx !== -1){
            platformData.articles[idx].status = status;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        }
        alert("状态修改成功");
        renderArticles();
    }

    function openMoveModal(artId){
        currentArticleId = artId;
        const select = document.getElementById("moveCategorySelect");
        select.innerHTML = "";
        platformData.categories.forEach(cat=>{
            let opt = document.createElement("option");
            opt.value = cat.id;
            opt.innerText = cat.name;
            select.appendChild(opt);
        });
        document.getElementById("moveModal").style.display = "flex";
    }
    function closeMoveModal(){
        document.getElementById("moveModal").style.display = "none";
    }
    function confirmMoveArticle(){
        const targetCateId = document.getElementById("moveCategorySelect").value;
        const idx = platformData.articles.findIndex(a=>a.id===currentArticleId);
        if(idx>-1){
            platformData.articles[idx].categoryId = targetCateId;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
            renderArticles();
            closeMoveModal();
            alert("文章分类移动成功");
        }
    }

    function openNewArticleModal() {
        if (!currentCategoryId) return alert("请先选择一个CP分类");
        document.getElementById("articleModal").style.display = "flex";
        document.getElementById("newArticleTitle").value = "";
    }
    function closeArticleModal() {
        document.getElementById("articleModal").style.display = "none";
    }
    function addArticle() {
        const title = document.getElementById("newArticleTitle").value.trim();
        if (!title) return alert("请输入文章标题");
        const newId = Date.now().toString();
        platformData.articles.push({
            id: newId,
            categoryId: currentCategoryId,
            title,
            content: "",
            status:"unread"
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        renderArticles();
        closeArticleModal();
    }
    function renderArticles() {
        const gridEl = document.getElementById("articleGrid");
        gridEl.innerHTML = "";
        let searchKey = document.getElementById("searchInput").value.trim().toLowerCase();
        let filtered = platformData.articles.filter(a => a.categoryId === currentCategoryId);
        if(searchKey){
            filtered = filtered.filter(a=>a.title.toLowerCase().includes(searchKey));
        }
        if(currentFilterStatus !== "all"){
            filtered = filtered.filter(a=>a.status === currentFilterStatus);
        }
        filtered.forEach(art => {
            const card = document.createElement("div");
            card.className = "article-card";
            card.innerHTML = `
                <div class="article-cover">${art.title}</div>
                <div class="article-info">
                    <div class="article-title">${art.title}</div>
                    <div class="article-actions" style="display:${isAuthor?'flex':'none'}">
                        <button class="move-btn" onclick="openMoveModal('${art.id}')">移动分类</button>
                        <button class="del-btn" onclick="deleteArticle('${art.id}')">删除</button>
                    </div>
                </div>
            `;
            card.onclick = (e) => {
                if (e.target.classList.contains("del-btn")||e.target.classList.contains("move-btn")) return;
                openReader(art.id);
            };
            gridEl.appendChild(card);
        });
    }
    function deleteArticle(id) {
        if (!confirm("确定删除这篇文章？")) return;
        platformData.articles = platformData.articles.filter(a => a.id !== id);
        platformData.comments = platformData.comments.filter(c => c.articleId !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        renderArticles();
    }

    function openReader(id) {
        currentArticleId = id;
        const art = platformData.articles.find(a => a.id === id);
        if (!art) return;
        document.getElementById("readerTitle").value = art.title;
        document.querySelector(".bookshelf-view").style.display = "none";
        document.getElementById("readerView").style.display = "flex";
        renderArticleBody(art);
        renderComments();
    }

    function renderArticleBody(art) {
        const container = document.getElementById("articleBodyContainer");
        const paragraphs = art.content.split("\n");
        container.innerHTML = "";
        inlineComments = JSON.parse(localStorage.getItem(`${STORAGE_KEY}_inline_${currentArticleId}`)) || {};

        paragraphs.forEach((p, idx) => {
            const paraId = `para-${idx}`;
            const paraEl = document.createElement("div");
            paraEl.className = "article-paragraph";
            paraEl.id = paraId;
            paraEl.textContent = p;

            const commentBox = document.createElement("div");
            commentBox.className = "inline-comment-box";
            commentBox.id = `comment-box-${idx}`;
            commentBox.style.display = "none";
            commentBox.innerHTML = `
                <button class="close-comment-btn" onclick="closeInlineComment(${idx})">×</button>
                <textarea placeholder="写下这段的细节评价"></textarea>
                <button class="submit-btn" style="font-size:12px;padding:4px 8px" onclick="addInlineComment(${idx})">提交评价</button>
                <div class="inline-comment-list" id="inline-comment-list-${idx}"></div>
            `;

            container.appendChild(paraEl);
            container.appendChild(commentBox);

            if (inlineComments[idx]) {
                showCommentList(idx);
            }
        });

        container.onmouseup = function () {
            const sel = window.getSelection();
            const text = sel.toString().trim();
            if (!text) return;
            const range = sel.getRangeAt(0);
            const para = range.startContainer.parentElement.closest(".article-paragraph");
            if (!para) return;
            const idx = para.id.split("-")[1];
            const box = document.getElementById(`comment-box-${idx}`);
            box.style.display = "block";

            const highlight = document.createElement("span");
            highlight.className = "highlight-text";
            highlight.textContent = text;
            range.deleteContents();
            range.insertNode(highlight);
            sel.removeAllRanges();
        };
    }

    function closeInlineComment(idx) {
        document.getElementById(`comment-box-${idx}`).style.display = "none";
    }

    function showCommentList(idx) {
        const list = document.getElementById(`inline-comment-list-${idx}`);
        list.innerHTML = "";
        if (!inlineComments[idx]) return;
        inlineComments[idx].forEach((c, i) => {
            list.innerHTML += `
                <div class="comment-item" data-cid="${i}">
                    <div class="comment-name">
                        ${c.nickname} · ${c.time}
                        ${c.isAuthor ? '<span class="author-tag">作者回复</span>' : ''}
                        ${isAuthor ? `<span class="reply-btn" onclick="toggleReply(${idx},${i})">回复</span><span class="del-cmt-btn" onclick="delInlineComment(${idx},${i})">删除</span>` : ''}
                    </div>
                    <div>${c.content}</div>
                    <div class="reply-box" id="reply-box-${idx}-${i}">
                        <textarea placeholder="写下作者回复" style="width:100%;height:60px;"></textarea>
                        <button class="submit-btn" style="font-size:12px;padding:4px 8px;margin-top:5px" onclick="submitReply(${idx},${i})">提交回复</button>
                    </div>
                </div>
            `;
        });
    }

    function addInlineComment(idx) {
        const box = document.getElementById(`comment-box-${idx}`);
        const textarea = box.querySelector("textarea");
        const content = textarea.value.trim();
        const nickname = document.getElementById("nickname").value.trim() || "匿名";
        if (!content) return alert("请输入评价内容");

        if (!inlineComments[idx]) inlineComments[idx] = [];
        inlineComments[idx].push({
            nickname,
            content,
            time: new Date().toLocaleString(),
            isAuthor: false
        });
        localStorage.setItem(`${STORAGE_KEY}_inline_${currentArticleId}`, JSON.stringify(inlineComments));
        textarea.value = "";
        showCommentList(idx);
        alert("评价已提交");
    }

    function toggleReply(idx, i) {
        const box = document.getElementById(`reply-box-${idx}-${i}`);
        box.style.display = box.style.display === "block" ? "none" : "block";
    }
    function submitReply(idx, i) {
        const box = document.getElementById(`reply-box-${idx}-${i}`);
        const textarea = box.querySelector("textarea");
        const content = textarea.value.trim();
        if (!content || !isAuthor) return alert("无权限或内容为空");

        inlineComments[idx].push({
            nickname: "作者",
            content,
            time: new Date().toLocaleString(),
            isAuthor: true
        });
        localStorage.setItem(`${STORAGE_KEY}_inline_${currentArticleId}`, JSON.stringify(inlineComments));
        textarea.value = "";
        box.style.display = "none";
        showCommentList(idx);
        alert("作者回复已提交");
    }

    function delInlineComment(idx, i) {
        if (!isAuthor || !confirm("确定删除这条评价？")) return;
        inlineComments[idx].splice(i, 1);
        if (inlineComments[idx].length === 0) delete inlineComments[idx];
        localStorage.setItem(`${STORAGE_KEY}_inline_${currentArticleId}`, JSON.stringify(inlineComments));
        showCommentList(idx);
    }

    function goBack() {
        document.getElementById("readerView").style.display = "none";
        document.querySelector(".bookshelf-view").style.display = "flex";
        currentArticleId = null;
    }

    function toggleEdit() {
        if (!isAuthor) return alert("无编辑权限");
        const art = platformData.articles.find(a=>a.id===currentArticleId);
        document.getElementById("editContent").value = art.content;
        document.getElementById("indentSwitch").checked = false;
        document.getElementById("editModal").style.display = "flex";
    }
    function closeEditModal() {
        document.getElementById("editModal").style.display = "none";
    }
    function saveEditContent() {
        let content = document.getElementById("editContent").value;
        const needIndent = document.getElementById("indentSwitch").checked;
        if (needIndent) {
            content = content.replace(/^/gm, "　　");
        }
        const idx = platformData.articles.findIndex(a=>a.id===currentArticleId);
        if(idx>-1) platformData.articles[idx].content = content;
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        closeEditModal();
        openReader(currentArticleId);
        alert("文章已保存（缩进已" + (needIndent ? "开启" : "关闭") + "）");
    }
    function saveArticle() {
        alert("已自动保存编辑内容");
    }

    function addComment() {
        const nick = document.getElementById("nickname").value.trim() || "匿名";
        const text = document.getElementById("comment-input").value.trim();
        if (!text || !currentArticleId) return alert("请输入评论内容");
        platformData.comments.push({
            id: Date.now().toString(),
            articleId: currentArticleId,
            user: nick,
            content: text,
            time: new Date().toLocaleString(),
            reply: []
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        document.getElementById("comment-input").value = "";
        renderComments();
    }

    // 文末评论回复删除
    function toggleBottomReply(cid){
        const dom = document.getElementById(`bottom-reply-${cid}`);
        dom.style.display = dom.style.display==="block"?"none":"block";
    }
    function submitBottomReply(cid){
        if(!isAuthor)return;
        const comment = platformData.comments.find(c=>c.id===cid);
        const inputDom = document.querySelector(`#bottom-reply-${cid} textarea`);
        const val = inputDom.value.trim();
        if(!val)return alert("回复内容不能为空");
        comment.reply.push({
            name:"作者",
            content:val,
            time:new Date().toLocaleString()
        });
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        renderComments();
    }
    function delBottomComment(cid){
        if(!isAuthor||!confirm("确认删除该评论？"))return;
        platformData.comments = platformData.comments.filter(c=>c.id!==cid);
        localStorage.setItem(STORAGE_KEY,JSON.stringify(platformData));
        renderComments();
    }

    function renderComments() {
        const listEl = document.getElementById("commentList");
        listEl.innerHTML = "";
        const comments = platformData.comments.filter(c => c.articleId === currentArticleId);
        comments.forEach(c => {
            let replyHtml = "";
            if(c.reply && c.reply.length>0){
                c.reply.forEach(r=>{
                    replyHtml += `<div style="margin-top:6px;padding:6px;background:#f5f0e6;border-radius:4px;font-size:13px;">
                        <span class="author-tag">${r.name}</span> ${r.time}：${r.content}
                    </div>`;
                });
            }
            let optHtml = isAuthor ? `
                <span class="reply-btn" onclick="toggleBottomReply('${c.id}')">回复</span>
                <span class="del-cmt-btn" onclick="delBottomComment('${c.id}')">删除</span>
                <div id="bottom-reply-${c.id}" style="display:none;margin-top:8px;">
                    <textarea placeholder="作者回复内容" style="width:100px;height:40px;"></textarea>
                    <button class="submit-btn" style="font-size:12px;padding:2px 6px;margin-left:4px;" onclick="submitBottomReply('${c.id}')">提交</button>
                </div>
            ` : "";
            listEl.innerHTML += `
                <div class="comment-item">
                    <div class="comment-name">${c.user} · ${c.time} ${optHtml}</div>
                    <div>${c.content}</div>
                    ${replyHtml}
                </div>
            `;
        });
    }

    document.getElementById("searchInput").addEventListener("keydown",function(e){
        if(e.key === "Enter") searchArticle();
    });

    window.onload = function() {
        if (platformData.categories.length === 0) {
            platformData.categories.push({ id: "default", name: "默认CP" });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(platformData));
        }
        currentCategoryId = platformData.categories[0].id;
        renderCategories();
        renderArticles();
    }
</script>
</body>
</html>
